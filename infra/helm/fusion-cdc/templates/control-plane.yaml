{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fusion-cdc.fullname" . }}-control-plane
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  {{- if not .Values.controlPlane.hpa.enabled }}
  replicas: {{ .Values.controlPlane.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fusion-cdc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "fusion-cdc.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
        {{- with .Values.controlPlane.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.controlPlane.service.port }}"
        {{- with .Values.controlPlane.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fusion-cdc.controlPlane.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.controlPlane.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.controlPlane.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: control-plane
          image: {{ include "fusion-cdc.image" (dict "global" .Values.global "image" .Values.controlPlane.image "ctx" .) }}
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          {{- with .Values.controlPlane.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.service.port }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.controlPlane.config.logLevel | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.controlPlane.config.environment | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.controlPlane.config.corsOrigins | quote }}
            - name: CONTROL_PLANE_URL
              value: {{ include "fusion-cdc.controlPlaneURL" . | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" . }}
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" . }}
                  key: SECRET_KEY
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" . }}
                  key: ENCRYPTION_KEY
            - name: WORKER_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" . }}
                  key: WORKER_TOKEN_SECRET
            {{- if or .Values.global.secrets.existingSecret .Values.global.secrets.redisUrl .Values.externalRedis.url }}
            - name: REDIS_URL
              {{- if or .Values.global.secrets.existingSecret .Values.global.secrets.redisUrl }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" . }}
                  key: REDIS_URL
              {{- else }}
              value: {{ .Values.externalRedis.url | quote }}
              {{- end }}
            {{- end }}
            {{- include "fusion-cdc.renderEnv" (dict "env" .Values.controlPlane.env "extraEnv" .Values.controlPlane.extraEnv) | nindent 12 }}
          {{- if .Values.controlPlane.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.controlPlane.livenessProbe.httpGet.path }}
              port: {{ .Values.controlPlane.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.controlPlane.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.controlPlane.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.controlPlane.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.controlPlane.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.controlPlane.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.controlPlane.readinessProbe.httpGet.path }}
              port: {{ .Values.controlPlane.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.controlPlane.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.controlPlane.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.controlPlane.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.controlPlane.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.controlPlane.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.controlPlane.startupProbe.httpGet.path }}
              port: {{ .Values.controlPlane.startupProbe.httpGet.port }}
            failureThreshold: {{ .Values.controlPlane.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.controlPlane.startupProbe.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.controlPlane.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlPlane.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlPlane.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fusion-cdc.fullname" . }}-control-plane
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
  {{- with .Values.controlPlane.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.controlPlane.service.type }}
  selector:
    {{- include "fusion-cdc.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
  ports:
    - name: http
      port: {{ .Values.controlPlane.service.port }}
      targetPort: http
---
{{- if .Values.controlPlane.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "fusion-cdc.fullname" . }}-control-plane
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "fusion-cdc.fullname" . }}-control-plane
  minReplicas: {{ .Values.controlPlane.hpa.minReplicas }}
  maxReplicas: {{ .Values.controlPlane.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.controlPlane.hpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.controlPlane.hpa.targetMemoryUtilizationPercentage }}
{{- end }}
---
{{- if .Values.controlPlane.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "fusion-cdc.fullname" . }}-control-plane
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  minAvailable: {{ .Values.controlPlane.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "fusion-cdc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
{{- end }}
{{- end }}
