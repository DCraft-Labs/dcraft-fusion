# ── Headless Services (StatefulSet discovery) ─────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: cdc-worker-postgres-headless
  namespace: fusion
  labels:
    app.kubernetes.io/name: cdc-worker-postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: cdc-worker-postgres
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
---
