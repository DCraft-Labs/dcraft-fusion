# ─────────────────────────────────────────────────────────────────────────────
# Fusion CDC Engine — Production Overlay (AWS EKS)
#
# Key differences from base:
#   - LoadBalancer services / ALB ingress
#   - gp3 EBS storage classes
#   - External Secrets Operator (ESO) for secret injection from AWS Secrets Manager
#   - Pod anti-affinity across AZs
#   - Higher resource requests suitable for t3.large/m5.xlarge nodes
#   - Source DB manifests excluded (sources are external, not in cluster)
#
# Deploy:
#   kubectl apply -k kubernetes/overlays/production/
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fusion

# Inherit everything from base
resources:
  - ../../
  - ingress.yaml             # Production: TLS via ALB ingress

# Override image tags to production ECR images
# These are overridden by CI/CD (e.g., kustomize edit set image ...)
images:
  - name: fusion/control-plane
    newName: 123456789.dkr.ecr.ap-south-1.amazonaws.com/fusion/control-plane
    newTag: "latest"
  - name: fusion/cdc-worker
    newName: 123456789.dkr.ecr.ap-south-1.amazonaws.com/fusion/cdc-worker
    newTag: "latest"
  - name: fusion/frontend
    newName: 123456789.dkr.ecr.ap-south-1.amazonaws.com/fusion/frontend
    newTag: "latest"
  - name: fusion/transform-worker
    newName: 123456789.dkr.ecr.ap-south-1.amazonaws.com/fusion/transform-worker
    newTag: "latest"

# Patch out dev-only source database manifests
patchesStrategicMerge:
  - patches/remove-dev-sources.yaml

patches:
  - path: patches/storage-class.yaml
  - path: patches/configmap.yaml
