name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Required check name is stable: "gate"
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Forbid legacy product branding in source
        shell: bash
        run: |
          set -euo pipefail
          # Character-class form matches "datasphere" in product files without
          # putting that contiguous word in this workflow (avoids self-fail).
          matches="$(
            git ls-files \
              'apps' 'services' 'engines' 'packages' 'docs' 'infra' 'branding' 'contracts' 'scripts' \
              'README.md' 'OPEN_CORE.md' 'CONTRIBUTING.md' 'SECURITY.md' 'NOTICE' \
              | xargs -r grep -nEi 'data[s]phere|Data[S]phere' -- \
              || true
          )"
          if [[ -n "${matches}" ]]; then
            echo "::error::Forbidden legacy branding reference found:"
            echo "${matches}"
            exit 1
          fi
          echo "OK: no forbidden legacy branding in product source"

      - name: Forbid committed private keys under infra
        shell: bash
        run: |
          set -euo pipefail
          matches="$(
            git ls-files 'infra' \
              | xargs -r grep -nE 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY' -- \
              || true
          )"
          if [[ -n "${matches}" ]]; then
            echo "::error::Private key material found under infra/:"
            echo "${matches}"
            exit 1
          fi
          echo "OK: no private key PEM blocks under infra/"

  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      kernel: ${{ steps.filter.outputs.kernel }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
            kernel:
              - 'services/control-plane-kernel/**'
            helm:
              - 'infra/helm/**'

  web:
    name: web
    needs: [gate, changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - run: npm audit --audit-level=high

  kernel:
    name: kernel
    needs: [gate, changes]
    if: needs.changes.outputs.kernel == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
      - run: go test ./...
        working-directory: services/control-plane-kernel

  helm:
    name: helm
    needs: [gate, changes]
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4
      - name: Helm lint charts
        shell: bash
        run: |
          set -euo pipefail
          helm lint infra/helm/dcraft-fusion \
            --set global.secrets.existingSecret=fusion-secrets \
            --set externalRedis.addr=redis:6379
          helm lint infra/helm/fusion-cdc \
            --set global.secrets.existingSecret=fusion-cdc-secrets
          helm template fusion infra/helm/dcraft-fusion \
            --set global.secrets.existingSecret=fusion-secrets \
            --set externalRedis.addr=redis:6379 >/dev/null
          helm template fusion-cdc infra/helm/fusion-cdc \
            --set global.secrets.existingSecret=fusion-cdc-secrets >/dev/null
