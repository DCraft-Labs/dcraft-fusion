# ─────────────────────────────────────────────────────────────────────────────
# Fusion CDC Engine — Redis (Bitnami Helm-compatible StatefulSet)
# 3-node standalone setup; for production cluster use Bitnami Redis Cluster Helm
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fusion-redis
  namespace: fusion
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: fusion-cdc
spec:
  serviceName: fusion-redis-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: cache
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7.2-alpine
          command:
            - redis-server
            - --appendonly yes
            - --appendfsync everysec
            - --maxmemory 2gb
            - --maxmemory-policy allkeys-lru
            - --save 900 1
            - --save 300 10
          ports:
            - name: redis
              containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "3Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: redis-data
              mountPath: /data
        # Redis exporter sidecar for Prometheus metrics
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.58.0
          ports:
            - name: metrics
              containerPort: 9121
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          securityContext:
            runAsNonRoot: true
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: hostpath
        resources:
          requests:
            storage: 10Gi

---
# ── Headless Service ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: fusion-redis-headless
  namespace: fusion
  labels:
    app.kubernetes.io/name: redis
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379

---
# ── ClusterIP Service (app access) ───────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: fusion-redis-master
  namespace: fusion
  labels:
    app.kubernetes.io/name: redis
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: metrics
      port: 9121
      targetPort: 9121
  type: ClusterIP

---
# ── PodDisruptionBudget ───────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fusion-redis-pdb
  namespace: fusion
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
