apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-control-plane-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-cdc-worker-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-control-plane-role
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-control-plane-binding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-control-plane-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-control-plane-role
  apiGroup: rbac.authorization.k8s.io
