# ─────────────────────────────────────────────────────────────────────────────
# Fusion CDC Engine — Kafka (Single-broker, KRaft mode, no ZooKeeper)
#
# Uses Apache Kafka 3.7 in KRaft mode — no ZooKeeper dependency.
# Single broker sufficient for local dev and small production workloads.
# NodePort 30092 exposes broker for external tools (kafka-ui, CLI, etc.)
#
# For production: replace with MSK (AWS managed) via configmap overlay.
# The configmap KAFKA_BOOTSTRAP_SERVERS is the only thing that changes.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: fusion
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: fusion-cdc
data:
  # KRaft server.properties
  server.properties: |
    # KRaft mode — no ZooKeeper
    process.roles=broker,controller
    node.id=1
    controller.quorum.voters=1@localhost:9093
    listeners=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
    advertised.listeners=PLAINTEXT://fusion-kafka.fusion.svc.cluster.local:9092,EXTERNAL://localhost:30092
    listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
    controller.listener.names=CONTROLLER
    inter.broker.listener.name=PLAINTEXT

    # Storage
    log.dirs=/var/lib/kafka/data

    # Topic defaults (can override per-topic)
    num.partitions=3
    default.replication.factor=1
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1

    # Retention
    log.retention.hours=24
    log.retention.bytes=10737418240
    log.segment.bytes=536870912

    # Performance
    num.network.threads=3
    num.io.threads=8
    socket.send.buffer.bytes=102400
    socket.receive.buffer.bytes=102400
    socket.request.max.bytes=104857600

    # Auto topic creation (allow CDC workers to create topics)
    auto.create.topics.enable=true
    delete.topic.enable=true
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fusion-kafka
  namespace: fusion
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: message-broker
    app.kubernetes.io/part-of: fusion-cdc
spec:
  serviceName: fusion-kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: message-broker
        app.kubernetes.io/part-of: fusion-cdc
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      initContainers:
        # KRaft requires a cluster ID to be formatted before first start
        - name: kafka-init
          image: apache/kafka:3.7.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              CLUSTER_ID_FILE=/var/lib/kafka/data/cluster_id
              if [ ! -f "$CLUSTER_ID_FILE" ]; then
                echo "Formatting KRaft storage..."
                CLUSTER_ID=$(/opt/kafka/bin/kafka-storage.sh random-uuid)
                /opt/kafka/bin/kafka-storage.sh format \
                  --cluster-id "$CLUSTER_ID" \
                  --config /opt/kafka/config/kraft/server.properties
                echo "$CLUSTER_ID" > "$CLUSTER_ID_FILE"
                echo "KRaft storage formatted with cluster ID: $CLUSTER_ID"
              else
                echo "KRaft storage already formatted (cluster ID: $(cat $CLUSTER_ID_FILE))"
              fi
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx256m -Xms128m"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: kafka-config-vol
              mountPath: /opt/kafka/config/kraft/server.properties
              subPath: server.properties
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: plaintext
              containerPort: 9092
            - name: controller
              containerPort: 9093
            - name: external
              containerPort: 9094
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx512m -Xms256m"
            - name: KAFKA_JVM_PERFORMANCE_OPTS
              value: "-server -XX:+UseG1GC -XX:MaxGCPauseMillis=20"
          command:
            - /opt/kafka/bin/kafka-server-start.sh
            - /opt/kafka/config/kraft/server.properties
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: kafka-config-vol
              mountPath: /opt/kafka/config/kraft/server.properties
              subPath: server.properties
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /opt/kafka/bin/kafka-broker-api-versions.sh
                - --bootstrap-server
                - localhost:9092
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
      volumes:
        - name: kafka-config-vol
          configMap:
            name: kafka-config
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: hostpath
        resources:
          requests:
            storage: 20Gi
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: fusion-kafka-headless
  namespace: fusion
  labels:
    app.kubernetes.io/name: kafka
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
# ClusterIP — internal broker address used by all app pods
apiVersion: v1
kind: Service
metadata:
  name: fusion-kafka
  namespace: fusion
  labels:
    app.kubernetes.io/name: kafka
spec:
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
  type: ClusterIP
---
# NodePort — external access (kafka-ui, CLI tools, local testing)
apiVersion: v1
kind: Service
metadata:
  name: fusion-kafka-external
  namespace: fusion
  labels:
    app.kubernetes.io/name: kafka
spec:
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: external
      port: 9094
      targetPort: 9094
      nodePort: 30092
  type: NodePort
