name: Publish images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: control-plane-kernel
            image: dcraft-fusion-control-plane-kernel
            context: .
            file: services/control-plane-kernel/Dockerfile
            platforms: linux/amd64,linux/arm64
          - name: web
            image: dcraft-fusion-web
            context: .
            file: apps/web/Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v5

      - name: Derive tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          REF="${GITHUB_REF_NAME}"
          SEMVER="${REF#v}"
          SHA_SHORT="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          REGISTRY="ghcr.io/dcraft-labs"
          IMAGE="${REGISTRY}/${{ matrix.image }}"
          {
            echo "image=${IMAGE}"
            echo "semver=${SEMVER}"
            echo "tags<<EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:${SEMVER}"
            echo "${IMAGE}:sha-${SHA_SHORT}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          # v1.3.5 Fix 1: bake OCI provenance labels into the image so the
          # published image carries its source git SHA + tag. The post-build
          # verification step below asserts the revision label matches the
          # tag's commit SHA — catching the class of mismatch where the
          # published image wasn't actually built from the tagged commit.
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.semver }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # v1.3.5 Fix 1: post-build provenance verification. Pull the published
      # image (amd64 variant on the amd64 runner) and read its
      # org.opencontainers.image.revision label via docker inspect, then
      # assert it equals the tagged commit SHA. Fail the workflow on
      # mismatch. (docker buildx imagetools inspect --format '{{ json .Image }}'
      # returns null for multi-platform manifests, so we use docker pull +
      # docker inspect which reliably reads the config labels from the
      # pulled platform variant.)
      - name: Verify provenance label matches tag SHA
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          SEMVER: ${{ steps.meta.outputs.semver }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "==> pulling ${IMAGE}:${SEMVER} to inspect provenance label"
          docker pull "${IMAGE}:${SEMVER}" >/dev/null
          ACTUAL_SHA="$(docker inspect "${IMAGE}:${SEMVER}" \
            --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          echo "    expected SHA: ${EXPECTED_SHA}"
          echo "    actual SHA:   ${ACTUAL_SHA}"
          if [[ -z "${ACTUAL_SHA}" ]]; then
            echo "ERROR: org.opencontainers.image.revision label is missing from ${IMAGE}:${SEMVER}"
            exit 1
          fi
          if [[ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]]; then
            echo "ERROR: provenance mismatch — image revision label (${ACTUAL_SHA}) != tag SHA (${EXPECTED_SHA})"
            exit 1
          fi
          echo "OK: provenance label matches tag SHA"
