# Local smoke stack: Postgres + Redis for DCraft Fusion / Fusion CDC
# Namespace: dcraft-local
---
apiVersion: v1
kind: Namespace
metadata:
  name: dcraft-local
---
apiVersion: v1
kind: Secret
metadata:
  name: fusion-secrets
  namespace: dcraft-local
type: Opaque
stringData:
  POSTGRES_DSN: postgres://fusion:fusion_local@postgres:5432/fusion?sslmode=disable
  FUSION_SEED_FOUNDER_EMAIL: founder@dcraftlabs.com
  FUSION_SEED_FOUNDER_PASSWORD: changeme-founder
  FUSION_SEED_SUPERADMIN_EMAIL: superadmin@dcraftlabs.com
  FUSION_SEED_SUPERADMIN_PASSWORD: changeme-superadmin
---
apiVersion: v1
kind: Secret
metadata:
  name: fusion-cdc-secrets
  namespace: dcraft-local
type: Opaque
stringData:
  DATABASE_URL: postgresql://fusion:fusion_local@postgres:5432/fusion_cdc_metadata
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: local-dev-secret-key-change-me
  ENCRYPTION_KEY: CHANGE_ME_ENCRYPTION_KEY_32C!!
  WORKER_TOKEN_SECRET: local-worker-token-secret
  WORKER_TOKEN: local-worker-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: dcraft-local
data:
  00-init.sql: |
    SELECT 'ok' WHERE current_database() = 'fusion';
    CREATE DATABASE fusion_cdc_metadata;
    -- CDC source DB (pg-source alias) — mirrors scripts/seed-admin.sql expectations.
    CREATE DATABASE source_db;
    CREATE DATABASE fusion_dw;
    DO $$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'cdc_user') THEN
        CREATE ROLE cdc_user WITH LOGIN REPLICATION PASSWORD 'cdc_password';
      END IF;
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'dw_user') THEN
        CREATE ROLE dw_user WITH LOGIN PASSWORD 'dw_password';
      END IF;
    END
    $$;
  01-source-db.sql: |
    \c source_db
    CREATE TABLE IF NOT EXISTS users (
      id SERIAL PRIMARY KEY,
      email TEXT NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    CREATE TABLE IF NOT EXISTS orders (
      id SERIAL PRIMARY KEY,
      user_id INTEGER REFERENCES users(id),
      amount NUMERIC(12,2) NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    GRANT SELECT ON ALL TABLES IN SCHEMA public TO cdc_user;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO cdc_user;
    DROP PUBLICATION IF EXISTS fusion_pub;
    CREATE PUBLICATION fusion_pub FOR TABLE users, orders;
  02-fusion-dw.sql: |
    \c fusion_dw
    GRANT ALL ON SCHEMA public TO dw_user;
---
# ─────────────────────────────────────────────────────────────────────────────
# Postgres durability (local-dev)
#
# The Docker Desktop built-in `storage-provisioner` (kube-system) is unreliable
# under CPU pressure (CrashLoopBackOff, lost leader-election lease) and PVCs
# bound to a dynamic storage class stay Pending forever. To make postgres data
# durable across pod restarts without depending on the dynamic provisioner, we
# provision a hostPath PersistentVolume + a matching PersistentVolumeClaim.
#
# hostPath persists on the Docker Desktop VM's filesystem and survives pod
# deletes/recreates (though NOT a full Docker Desktop reset). This is a
# LOCAL-DEV-ONLY escape hatch. Production MUST use a real storage class or an
# external managed Postgres (RDS, Cloud SQL, etc.) — hostPath is single-node
# only and does not survive node replacement.
#
# ── Cross-platform hostPath override ─────────────────────────────────────────
# The hostPath `path` below is parameterized via the placeholder
# `${DCRAFT_PGDATA_HOSTPATH}`. `deploy.ps1` substitutes this placeholder from
# the `DCRAFT_PGDATA_HOSTPATH` environment variable before `kubectl apply`, so
# operators can override the path without editing this file:
#
#   Windows (Docker Desktop, bind to repo .tmp/pgdata):
#     $env:DCRAFT_PGDATA_HOSTPATH = "E:/Dcraft/.tmp/pgdata"
#   Linux / Mac (Docker Desktop VM or minikube):
#     export DCRAFT_PGDATA_HOSTPATH=/var/dcraft-local/postgres-data
#     # or: /tmp/dcraft-pgdata
#
# If `DCRAFT_PGDATA_HOSTPATH` is unset, `deploy.ps1` falls back to
# `/var/dcraft-local/postgres-data` (the Docker Desktop Linux VM default that
# works on all platforms when no host bind is required).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-data-pv
  namespace: dcraft-local
  labels:
    app: postgres
    dcraft.io/role: local-dev-storage
spec:
  capacity:
    storage: 5Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: ${DCRAFT_PGDATA_HOSTPATH}
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: dcraft-local
  labels:
    app: postgres
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ""
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: postgres
      dcraft.io/role: local-dev-storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: dcraft-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          # wal_level=logical is required for the pg-source CDC connector
          # (pgoutput plugin + fusion_pub publication). Baked into the
          # command so it survives pod restarts even though there's no
          # postgresql.conf override file.
          args:
            - "-c"
            - "wal_level=logical"
            - "-c"
            - "max_wal_senders=10"
            - "-c"
            - "max_replication_slots=10"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: fusion
            - name: POSTGRES_USER
              value: fusion
            - name: POSTGRES_PASSWORD
              value: fusion_local
            # PGDATA must be a subdirectory of the mounted volume, not the
            # volume root, or postgres refuses to init when the dir has perms
            # it doesn't expect.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: init
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "fusion", "-d", "fusion"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "fusion", "-d", "fusion"]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: init
          configMap:
            name: postgres-init
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dcraft-local
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dcraft-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: dcraft-local
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
# nginx upstream aliases baked into published images (DNS names != Helm service names)
apiVersion: v1
kind: Service
metadata:
  name: control-plane-kernel
  namespace: dcraft-local
spec:
  type: ExternalName
  externalName: fusion-dcraft-fusion-control-plane-kernel.dcraft-local.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: fusion-control-plane-svc
  namespace: dcraft-local
spec:
  type: ExternalName
  externalName: fusion-cdc-control-plane.dcraft-local.svc.cluster.local
---
# pg-source alias: the seed-admin.sql source DSN is pg-source:5432/source_db.
# Alias to the shared postgres service so the DSN resolves without a second
# Postgres deployment. The source_db database is created by deploy.ps1.
apiVersion: v1
kind: Service
metadata:
  name: pg-source
  namespace: dcraft-local
spec:
  type: ExternalName
  externalName: postgres.dcraft-local.svc.cluster.local
---
# postgres-dest alias: the seed-admin.sql destination DSN is postgres-dest:5432/fusion_dw.
apiVersion: v1
kind: Service
metadata:
  name: postgres-dest
  namespace: dcraft-local
spec:
  type: ExternalName
  externalName: postgres.dcraft-local.svc.cluster.local

# ═════════════════════════════════════════════════════════════════════════════
# v1.2.10 — Local-dev source/destination infrastructure pods.
#
# The following Deployments + Services stand up the source databases and
# object-storage/catalog services that the seeded sources/destinations point
# at. They are LOCAL-DEV ONLY — production MUST use managed equivalents
# (RDS, Cloud SQL, DocumentDB, MinIO Operator / S3, Nessie/Polaris, etc.).
#
# Pods added:
#   • mysql-source  — MySQL 8.0  (host `mysql-source`, port 3306)
#   • mongo-source  — MongoDB 7  (host `mongo-source`, port 27017, no auth)
#   • minio         — MinIO      (API :9000, console :9001, creds minioadmin/minioadmin)
#   • nessie         — Nessie      (API :19120, mgmt :19121)
#
# Resource requests are intentionally small (128Mi–256Mi) since this is a
# single-node Docker Desktop cluster. The MySQL init schema (customers /
# products / orders) is inlined via a ConfigMap so the pod self-seeds on
# first boot.
# ═════════════════════════════════════════════════════════════════════════════

# ── MySQL source init schema (ConfigMap) ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-source-init
  namespace: dcraft-local
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS test;
    USE test;
    CREATE TABLE IF NOT EXISTS customers (
      id BIGINT NOT NULL AUTO_INCREMENT,
      email VARCHAR(255) NOT NULL,
      full_name VARCHAR(255) NOT NULL,
      country VARCHAR(64) NOT NULL DEFAULT 'IN',
      created_at DATETIME(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3),
      updated_at DATETIME(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3) ON UPDATE CURRENT_TIMESTAMP(3),
      PRIMARY KEY (id),
      UNIQUE KEY uq_customers_email (email)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
    CREATE TABLE IF NOT EXISTS products (
      id BIGINT NOT NULL AUTO_INCREMENT,
      sku VARCHAR(64) NOT NULL,
      name VARCHAR(255) NOT NULL,
      price DECIMAL(18,4) NOT NULL,
      category VARCHAR(64) NOT NULL DEFAULT 'general',
      created_at DATETIME(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3),
      updated_at DATETIME(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3) ON UPDATE CURRENT_TIMESTAMP(3),
      PRIMARY KEY (id),
      UNIQUE KEY uq_products_sku (sku)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
    CREATE TABLE IF NOT EXISTS orders (
      id BIGINT NOT NULL AUTO_INCREMENT,
      customer_id BIGINT NOT NULL,
      product_id BIGINT NOT NULL,
      quantity INT NOT NULL DEFAULT 1,
      amount DECIMAL(18,4) NOT NULL,
      status VARCHAR(32) NOT NULL DEFAULT 'pending',
      placed_at DATETIME(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3),
      updated_at DATETIME(3) NOT NULL DEFAULT CURRENT_TIMESTAMP(3) ON UPDATE CURRENT_TIMESTAMP(3),
      PRIMARY KEY (id),
      KEY ix_orders_customer (customer_id),
      KEY ix_orders_product (product_id),
      KEY ix_orders_status (status)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
    CREATE USER IF NOT EXISTS 'fusion_user'@'%' IDENTIFIED BY 'fusion_password';
    GRANT ALL PRIVILEGES ON test.* TO 'fusion_user'@'%';
    GRANT REPLICATION SLAVE, REPLICATION CLIENT ON *.* TO 'fusion_user'@'%';
    FLUSH PRIVILEGES;
---
# ── MySQL source Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-source
  namespace: dcraft-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-source
  template:
    metadata:
      labels:
        app: mysql-source
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root"
            - name: MYSQL_DATABASE
              value: "test"
          args:
            - "--server-id=1"
            - "--binlog-format=ROW"
            - "--binlog-row-image=FULL"
            - "--log-bin=binlog"
            - "--gtid-mode=ON"
            - "--enforce-gtid-consistency=ON"
          volumeMounts:
            - name: init
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/mysql
          startupProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1000m", memory: "512Mi" }
      volumes:
        - name: init
          configMap:
            name: mysql-source-init
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-source
  namespace: dcraft-local
spec:
  selector:
    app: mysql-source
  ports:
    - port: 3306
      targetPort: 3306
---
# ── MongoDB source Deployment ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-source
  namespace: dcraft-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-source
  template:
    metadata:
      labels:
        app: mongo-source
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          # No auth for local dev. Replica set is not enabled here; the seeded
          # source uses replica_set=rs0 but standalone mode is sufficient for
          # schema discovery and initial testing. Enable --replSet in the args
          # below if your CDC worker requires oplog streaming.
          args: ["--bind_ip_all"]
          volumeMounts:
            - name: data
              mountPath: /data/db
          startupProbe:
            exec:
              command: ["sh", "-c", "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' | grep -q 1"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command: ["sh", "-c", "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' | grep -q 1"]
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1000m", memory: "512Mi" }
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-source
  namespace: dcraft-local
spec:
  selector:
    app: mongo-source
  ports:
    - port: 27017
      targetPort: 27017
---
# ── MinIO PersistentVolumeClaim ──────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: dcraft-local
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
# ── MinIO Deployment (S3-compatible object storage for Iceberg) ───────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: dcraft-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
          startupProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: dcraft-local
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
# ── MinIO bucket init Job (creates `iceberg-warehouse` bucket on first run) ──
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-bucket
  namespace: dcraft-local
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: MC_HOST_local
              value: "http://minioadmin:minioadmin@minio:9000"
          command: ["sh", "-c"]
          args:
            - |
              until mc ls local/ >/dev/null 2>&1; do
                echo "waiting for minio...";
                sleep 2;
              done
              mc mb --ignore-existing local/iceberg-warehouse || true
              echo "bucket iceberg-warehouse ready"
---
# ── Nessie catalog Deployment (Iceberg REST catalog) ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nessie
  namespace: dcraft-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nessie
  template:
    metadata:
      labels:
        app: nessie
    spec:
      containers:
        - name: nessie
          image: ghcr.io/projectnessie/nessie:latest
          ports:
            - containerPort: 19120
              name: api
            - containerPort: 19121
              name: mgmt
          env:
            - name: QUARKUS_HTTP_PORT
              value: "19120"
          startupProbe:
            httpGet:
              path: /api/v1/config
              port: 19120
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/v1/config
              port: 19120
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: nessie
  namespace: dcraft-local
spec:
  selector:
    app: nessie
  ports:
    - name: api
      port: 19120
      targetPort: 19120
    - name: mgmt
      port: 19121
      targetPort: 19121
