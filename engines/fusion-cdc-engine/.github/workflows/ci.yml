# ─────────────────────────────────────────────────────────────────────────────
# Fusion CDC Engine — CI Pipeline
# Runs on every push and pull request.
# Jobs: lint → unit-test (parallel per project) → build-check → integration-test
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff==0.3.7 mypy==1.9.0 bandit==1.7.8

      - name: Ruff lint (all projects)
        run: |
          ruff check fusion-cdc-engine/control-plane/
          ruff check fusion-cdc-engine/cdc-workers/
          ruff check fusion-cdc-engine/spark-consumer/

      - name: Security scan (bandit)
        run: |
          bandit -r fusion-cdc-engine/control-plane/app/ -ll -q
          bandit -r fusion-cdc-engine/cdc-workers/cdc_worker/ -ll -q
          bandit -r fusion-cdc-engine/spark-consumer/consumer/ -ll -q

      - name: Validate Helm chart
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - run: helm lint fusion-cdc-engine/helm/fusion-cdc/

      - name: Validate Kubernetes manifests (dry-run)
        run: |
          curl -fsSL https://raw.githubusercontent.com/yannh/kubeconform/master/scripts/download.sh | sh
          ./bin/kubeconform -strict -summary fusion-cdc-engine/kubernetes/*.yaml

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test-control-plane:
    name: Test / control-plane
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: fusion-cdc-engine/control-plane/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r fusion-cdc-engine/control-plane/requirements.txt

      - name: Run tests
        working-directory: fusion-cdc-engine/control-plane
        run: |
          PYTHONPATH=. pytest tests/ \
            -m "not integration" \
            --tb=short \
            -q \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: fusion-cdc-engine/control-plane/coverage.xml
          flags: control-plane
          fail_ci_if_error: false

  test-cdc-workers:
    name: Test / cdc-workers
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: fusion-cdc-engine/cdc-workers/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r fusion-cdc-engine/cdc-workers/requirements.txt

      - name: Run tests
        working-directory: fusion-cdc-engine/cdc-workers
        run: |
          PYTHONPATH=. pytest tests/ \
            -m "not integration and not load" \
            --tb=short \
            -q \
            --cov=cdc_worker \
            --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: fusion-cdc-engine/cdc-workers/coverage.xml
          flags: cdc-workers
          fail_ci_if_error: false

  test-spark-consumer:
    name: Test / spark-consumer
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: fusion-cdc-engine/spark-consumer/requirements.txt

      - name: Set up Java (for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r fusion-cdc-engine/spark-consumer/requirements.txt

      - name: Run tests
        working-directory: fusion-cdc-engine/spark-consumer
        env:
          PYSPARK_PYTHON: python3
          PYSPARK_DRIVER_PYTHON: python3
        run: |
          PYTHONPATH=. pytest tests/ \
            -m "not integration" \
            --tb=short \
            -q \
            --cov=consumer \
            --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: fusion-cdc-engine/spark-consumer/coverage.xml
          flags: spark-consumer
          fail_ci_if_error: false

  # ── Docker Build Check ───────────────────────────────────────────────────────
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-control-plane, test-cdc-workers, test-spark-consumer]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build control-plane image
        uses: docker/build-push-action@v5
        with:
          context: fusion-cdc-engine
          file: fusion-cdc-engine/docker/Dockerfile.control-plane
          push: false
          tags: fusion/control-plane:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build cdc-worker image
        uses: docker/build-push-action@v5
        with:
          context: fusion-cdc-engine
          file: fusion-cdc-engine/docker/Dockerfile.cdc-worker
          push: false
          tags: fusion/cdc-worker:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Integration Tests (Docker services required) ─────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-images
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fusion_user
          POSTGRES_PASSWORD: fusion_password
          POSTGRES_DB: fusion_cdc_metadata
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fusion_user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install all dependencies
        run: |
          pip install --upgrade pip
          pip install \
            -r fusion-cdc-engine/cdc-workers/requirements.txt \
            -r fusion-cdc-engine/spark-consumer/requirements.txt

      - name: Run cdc-workers integration tests
        working-directory: fusion-cdc-engine/cdc-workers
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          PYTHONPATH=. pytest tests/integration/ -m integration -v --tb=short

      - name: Run spark-consumer integration tests
        working-directory: fusion-cdc-engine/spark-consumer
        env:
          REDIS_URL: redis://localhost:6379/0
          PYSPARK_PYTHON: python3
          PYSPARK_DRIVER_PYTHON: python3
        run: |
          PYTHONPATH=. pytest tests/integration/ -m integration -v --tb=short
