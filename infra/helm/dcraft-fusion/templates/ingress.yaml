{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dcraft-fusion.fullname" . }}
  labels:
    {{- include "dcraft-fusion.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "web" }}
                name: {{ include "dcraft-fusion.fullname" $ }}-web
                port:
                  number: {{ $.Values.web.service.port }}
                {{- else }}
                name: {{ include "dcraft-fusion.fullname" $ }}-control-plane-kernel
                port:
                  number: {{ $.Values.controlPlaneKernel.service.port }}
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
