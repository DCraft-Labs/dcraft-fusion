# ─────────────────────────────────────────────────────────────────────────────
# Fusion CDC Engine — CDC Worker StatefulSet
#
# Workers use a StatefulSet (not Deployment) so each pod gets:
#   - A stable hostname (cdc-worker-postgres-0, cdc-worker-postgres-1 …)
#   - A dedicated PVC for SQLite checkpoint + fallback queue
#   - Ordered rolling updates (no two pods restart simultaneously)
#
# One StatefulSet per DB source type — add more for MySQL, MongoDB, etc.
# ─────────────────────────────────────────────────────────────────────────────

# ── Postgres CDC Worker StatefulSet ───────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cdc-worker-postgres
  namespace: fusion
  labels:
    app.kubernetes.io/name: cdc-worker-postgres
    app.kubernetes.io/component: cdc-worker
    app.kubernetes.io/part-of: fusion-cdc
    cdc.dcraftfusion.io/source-type: postgres
spec:
  serviceName: cdc-worker-postgres-headless
  replicas: 1           # 1 replica per DB host to avoid duplicate replication slots
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: cdc-worker-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cdc-worker-postgres
        app.kubernetes.io/component: cdc-worker
        app.kubernetes.io/part-of: fusion-cdc
        cdc.dcraftfusion.io/source-type: postgres
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fusion-cdc-worker
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      containers:
        - name: cdc-worker
          image: fusion/cdc-worker:latest
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fusion-config
          env:
            - name: CDC_SOURCE_TYPE
              value: postgres
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name    # pod name = stable unique ID
            - name: WORKER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fusion-secrets
                  key: WORKER_TOKEN
            - name: PG_SOURCE_DSN
              valueFrom:
                secretKeyRef:
                  name: fusion-secrets
                  key: PG_SOURCE_DSN
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: cdc-data
              mountPath: /var/lib/cdc
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
  # PVC template: each pod gets its own 5Gi volume
  volumeClaimTemplates:
    - metadata:
        name: cdc-data
        labels:
          app.kubernetes.io/part-of: fusion-cdc
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi

