# ─────────────────────────────────────────────────────────────────────────────
# Fusion CDC Engine — Ingress (nginx) + TLS
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fusion-ingress
  namespace: fusion
  labels:
    app.kubernetes.io/part-of: fusion-cdc
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Rate limiting — 100 req/s per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # CORS headers (API gateway handles auth)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    # TLS — cert-manager manages certificate issuance
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.dcraftfusion.io
      secretName: fusion-tls
  rules:
    - host: api.dcraftfusion.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fusion-control-plane-svc
                port:
                  number: 8000
