    runAsUser: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: app.dcraftfusion.io
        paths:
          - path: /
            pathType: Prefix
    tls: []

# ├бРђЮРѓг├бРђЮРѓг Transform Worker (DuckDB landing ├бРѓгРђЮ preferred over Spark) ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
transformWorker:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-transform-worker
    tag: "1.2.27"
    digest: ""
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 4Gi

  hpa:
    enabled: false
    minReplicas: 0
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    # v1.2.18: the transform-worker image runs as user `transform` (UID 2001,
    # GID 2001 Рђћ see docker/Dockerfile.transform-worker). Without explicit
    # runAsUser/fsGroup Kubernetes cannot verify the non-numeric USER
    # directive in the image and the pod fails with
    # CreateContainerConfigError. Pin both to 2001 so the pod starts cleanly.
    runAsUser: 2001
    fsGroup: 2001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]

  config:
    highPriorityQueue: fusion:transforms:high
    normalPriorityQueue: fusion:transforms:normal
    duckdbThreads: "2"
    duckdbMemoryLimit: 3GB

  env: {}
  extraEnv: []

  serviceAccount:
    create: false
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

  keda:
    # v1.2.27 Task 3: configurable KEDA max scale for the initial sync.
    # KEDA scales the transform-worker Deployment from minReplicaCount (idle,
    # scale-to-zero) up to maxReplicaCount when the
    # ``fusion:transforms:high`` queue depth grows. Each initial-load task
    # consumes one PK-range partition (Task 1), so raising maxReplicaCount
    # lets K concurrent pods process K partitions of the same table in
    # parallel (true intra-table parallelism). Raise this for large
    # initial loads (e.g. 50 for a 118M-row load with parallelism=16).
    # NOTE: KEDA's max is global per ScaledObject Рђћ the per-connection
    # ``parallelism`` (resource_limits.parallelism) controls how many
    # partitions a single connection enqueues, NOT how many pods KEDA will
    # spin up across ALL connections. Size maxReplicaCount for the peak
    # combined parallelism of all concurrent initial loads.
    enabled: false
    minReplicaCount: 0
    maxReplicaCount: 50
    cooldownPeriod: 120
    pollingInterval: 5

# ├бРђЮРѓг├бРђЮРѓг Monitoring (optional Prometheus Operator) ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
monitoring:
  serviceMonitor:
    enabled: false
    interval: 15s
    scrapeTimeout: 10s
