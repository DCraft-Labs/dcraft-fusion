{{- if .Values.controlPlane.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.controlPlane.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.controlPlane.ingress.className }}
  {{- with .Values.controlPlane.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.controlPlane.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-control-plane-svc
                port:
                  number: {{ $.Values.controlPlane.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
