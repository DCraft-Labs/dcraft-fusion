name: Bug report
description: Report a bug in DCraft Fusion
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please search existing issues first.
        For security vulnerabilities, use [GitHub Security Advisories](https://github.com/DCraft-Labs/dcraft-fusion/security/advisories/new) instead.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the problem
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Control plane / kernel
        - Web UI
        - Fusion CDC engine
        - Helm / infra
        - Docs
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Tag, branch, or commit SHA if known
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker/K8s, Node version, browser (as relevant)
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant logs or screenshots (redact secrets)
