# Local Docker Desktop overrides for dcraft-fusion (fits ~3Gi VM).
controlPlaneKernel:
  image:
    tag: "1.1.2"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Official nginx image runs as root on port 80 — disable non-root for local smoke.
web:
  image:
    tag: "1.1.2"
  podSecurityContext: null
  securityContext: null
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
