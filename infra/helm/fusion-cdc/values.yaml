# Fusion CDC Гўв‚¬вЂќ image-only chart (public)
# CDC engine source is proprietary. This chart deploys official DCraft Labs images from GHCR.
# Never commit real passwords. Prefer global.secrets.existingSecret.

global:
  imageRegistry: ""
  imagePullSecrets: []
  labels: {}
  edition: community

  secrets:
    # Pre-created Secret name (recommended). When set, the chart does not create secrets.
    existingSecret: ""
    # When true and existingSecret is empty, create a Secret from placeholders below.
    createSecret: false
    # Keys expected:
    #   DATABASE_URL, SECRET_KEY, ENCRYPTION_KEY, WORKER_TOKEN_SECRET, WORKER_TOKEN
    #   REDIS_URL (optional if externalRedis.url is set in ConfigMap path)
    databaseUrl: ""
    secretKey: ""
    encryptionKey: ""
    workerTokenSecret: ""
    workerToken: ""
    redisUrl: ""

nameOverride: ""
fullnameOverride: ""

# External Redis URL used when not injected via secret key REDIS_URL.
# Example: redis://redis.example:6379/0
externalRedis:
  url: ""

# ГўвЂќв‚¬ГўвЂќв‚¬ Kafka (in-cluster broker, KRaft mode) ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
# Enabled by default so local-dev gets a working CDC pipeline out of the box.
# Production should set kafka.enabled=false and provide KAFKA_BOOTSTRAP_SERVERS
# pointing at an external broker (MSK, Confluent Cloud, self-managed, etc.)
# via cdcWorkers.env / sparkConsumer.env overrides.
kafka:
  enabled: true
  # Number of broker replicas. 1 is fine for local-dev; use 3 for prod HA
  # (when using the in-cluster broker). Ignored when kafka.enabled=false.
  replicas: 1
  # Default bootstrap servers used by cdc-workers and spark-consumer when
  # kafka.enabled=true. Override per-workload via .Values.*.env.KAFKA_BOOTSTRAP_SERVERS.
  bootstrapServers: ""
  # Apache Kafka 3.7+ KRaft mode (no ZooKeeper).
  image:
    repository: apache/kafka
    tag: "3.7.0"
    pullPolicy: IfNotPresent
  # Topic defaults
  numPartitions: 3
  replicationFactor: 1
  # Retention
  logRetentionHours: 24
  logRetentionBytes: 10737418240
  # JVM heap
  initHeapOpts: "-Xmx256m -Xms128m"
  heapOpts: "-Xmx512m -Xms256m"
  # External NodePort for CLI/UI tools (kafka-ui, kcat, etc.). Set to 0 to disable.
  externalNodePort: 30092
  storage:
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]

# ГўвЂќв‚¬ГўвЂќв‚¬ Control Plane ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
controlPlane:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-control-plane
    tag: "1.2.7"
    digest: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000
    annotations: {}

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  livenessProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  startupProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    failureThreshold: 12
    periodSeconds: 10

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  config:
    logLevel: INFO
    environment: production
    algorithm: HS256
    accessTokenExpireMinutes: 60
    corsOrigins: "https://app.dcraftfusion.io"

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

  ingress:
    enabled: false
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/limit-rps: "100"
    hosts:
      - host: api.dcraftfusion.io
        paths:
          - path: /api
            pathType: Prefix
    tls: []

