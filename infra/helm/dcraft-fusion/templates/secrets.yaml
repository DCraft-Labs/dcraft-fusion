{{- if and .Values.global.secrets.createSecret (not .Values.global.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dcraft-fusion.fullname" . }}-secrets
  labels:
    {{- include "dcraft-fusion.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  POSTGRES_DSN: {{ .Values.global.secrets.postgresDsn | quote }}
  FUSION_SEED_FOUNDER_EMAIL: {{ .Values.global.secrets.seedFounderEmail | quote }}
  FUSION_SEED_FOUNDER_PASSWORD: {{ .Values.global.secrets.seedFounderPassword | quote }}
  FUSION_SEED_SUPERADMIN_EMAIL: {{ .Values.global.secrets.seedSuperadminEmail | quote }}
  FUSION_SEED_SUPERADMIN_PASSWORD: {{ .Values.global.secrets.seedSuperadminPassword | quote }}
  {{- if .Values.global.secrets.oidcPrivateKeyPem }}
  FUSION_OIDC_PRIVATE_KEY_PEM: {{ .Values.global.secrets.oidcPrivateKeyPem | quote }}
  {{- end }}
{{- end }}
