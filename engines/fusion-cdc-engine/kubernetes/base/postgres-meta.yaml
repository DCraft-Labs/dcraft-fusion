# ─────────────────────────────────────────────────────────────────────────────
# Fusion CDC Engine — PostgreSQL Metadata DB
# Stores: connection registry, checkpoints, tenant config, transform pipelines
# StatefulSet with PVC so metadata survives pod restarts
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fusion-postgres-meta
  namespace: fusion
  labels:
    app.kubernetes.io/name: postgres-meta
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: fusion-cdc
spec:
  serviceName: fusion-postgres-meta-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-meta
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-meta
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: fusion-cdc
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999        # postgres group
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: fusion-secrets
                  key: POSTGRES_META_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fusion-secrets
                  key: POSTGRES_META_PASSWORD
            - name: POSTGRES_DB
              value: fusion_cdc_metadata
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pg-meta-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "fusion_cdc_metadata"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "fusion_cdc_metadata"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: pg-meta-data
        labels:
          app.kubernetes.io/name: postgres-meta
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: hostpath
        resources:
          requests:
            storage: 10Gi
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: fusion-postgres-meta-headless
  namespace: fusion
  labels:
    app.kubernetes.io/name: postgres-meta
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: fusion-cdc
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres-meta
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# Stable service for all pods to connect to
apiVersion: v1
kind: Service
metadata:
  name: fusion-postgres-meta
  namespace: fusion
  labels:
    app.kubernetes.io/name: postgres-meta
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: fusion-cdc
spec:
  selector:
    app.kubernetes.io/name: postgres-meta
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
