apiVersion: v1
kind: Secret
metadata:
  name: fusion-secrets
  namespace: dcraft-fusion
type: Opaque
stringData:
  # Replace these values before applying to any shared cluster.
  POSTGRES_DB: fusion
  POSTGRES_USER: fusion
  POSTGRES_PASSWORD: fusion_local
  POSTGRES_DSN: postgres://fusion:fusion_local@postgres:5432/fusion?sslmode=disable
  FUSION_SEED_FOUNDER_PASSWORD: changeme-founder
  FUSION_SEED_SUPERADMIN_PASSWORD: changeme-superadmin
  # Leave FUSION_OIDC_PRIVATE_KEY_PEM unset to auto-generate a key at runtime.
