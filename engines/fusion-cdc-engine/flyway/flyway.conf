# ============================================================================
# FLYWAY CONFIGURATION FOR FUSION CDC ENGINE - MYSQL
# ============================================================================
# This configuration file is used by Flyway to manage MySQL database migrations
# for the Fusion CDC Engine metadata database.
# ============================================================================

# Database Connection
# Update these values with your actual MySQL database credentials
flyway.url=jdbc:mysql://localhost:3306/fusion_cdc_metadata?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
flyway.user=fusion_user
flyway.password=fusion_password

# Schema Management
# Default schema for metadata
flyway.schemas=fusion_cdc_metadata
flyway.defaultSchema=fusion_cdc_metadata

# Migration Locations
# Location of SQL migration scripts (V1__, V2__, etc.)
flyway.locations=filesystem:sql

# Migration Table
# Flyway uses this table to track migration history
flyway.table=flyway_schema_history

# Validation
# Validate migrations before applying
flyway.validateOnMigrate=true
flyway.validateMigrationNaming=true

# Clean
# Allow clean command for development
flyway.cleanDisabled=false

# Baseline
# Use baseline when applying Flyway to an existing database
# flyway.baselineOnMigrate=true
# flyway.baselineVersion=0
# flyway.baselineDescription=Fusion CDC Engine Baseline

# Placeholders
# Can be used in migration scripts with ${placeholder_name}
flyway.placeholders.database=fusion_cdc_metadata
flyway.placeholders.username=fusion_user

# Out of Order
# Allow migrations to be run out of order (not recommended for production)
flyway.outOfOrder=false

# Mixed Mode
# Allow mixing transactional and non-transactional migrations
flyway.mixed=false

# Group Migrations
# Execute all pending migrations in a single transaction
flyway.group=false

# Installed By
# Record who installed each migration
flyway.installedBy=fusion_admin

# Encoding
# SQL migration file encoding
flyway.encoding=UTF-8

# SQL Migration Separator
flyway.sqlMigrationSeparator=__

# SQL Migration Suffixes
flyway.sqlMigrationSuffixes=.sql

# Repeatable SQL Migration Prefix
flyway.repeatableSqlMigrationPrefix=R

# Clean (DANGEROUS - Never use in production!)
# Drops all database objects before migration
# flyway.cleanDisabled=false
# flyway.cleanOnValidationError=false

# Callbacks
# Directory for callback scripts
# flyway.callbacks=

# Target Version
# Migrate to specific version (leave empty for latest)
# flyway.target=

# Cherry Pick
# Comma-separated list of migrations to apply
# flyway.cherryPick=

# Stream
# Enable streaming of query results (useful for large migrations)
flyway.stream=true

# Batch
# Enable batch execution of SQL statements
flyway.batch=true

# Oracle SQL*Plus
# flyway.oracle.sqlplus=false

# Oracle SQL*Plus Warn
# flyway.oracle.sqlplusWarn=false

# Connect Retries
# Number of times to retry connection
flyway.connectRetries=3

# Connect Retries Interval
# Seconds between connection retry attempts
flyway.connectRetriesInterval=1

# Init SQL
# SQL to execute before Flyway migration
# flyway.initSql=

# Lock Retry Count
# Number of times to retry acquiring lock
flyway.lockRetryCount=50

# JDBC Properties
# Additional JDBC driver properties
# flyway.jdbcProperties.propertyName=propertyValue

# Skip Default Callbacks
# flyway.skipDefaultCallbacks=false

# Skip Default Resolvers
# flyway.skipDefaultResolvers=false

# Output Query Results
# Display query results in console
flyway.outputQueryResults=true

# ============================================================================
# PRODUCTION RECOMMENDATIONS
# ============================================================================
# 1. Store credentials in environment variables instead of this file:
#    export FLYWAY_URL="jdbc:mysql://..."
#    export FLYWAY_USER="fusion_user"
#    export FLYWAY_PASSWORD="secure_password"
#
# 2. Enable baseline for existing databases:
#    flyway.baselineOnMigrate=true
#
# 3. Keep cleanDisabled=true to prevent accidental data loss
#
# 4. Use version control for this file (without passwords)
#
# 5. Test migrations in dev/staging before production
# ============================================================================
