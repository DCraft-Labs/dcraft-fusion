# ─────────────────────────────────────────────────────────────────────────────
# Fusion CDC Engine — Control Plane Deployment
# 2 replicas | readiness probe GET /api/v1/monitoring/health | rolling update
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fusion-control-plane
  namespace: fusion
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: fusion-cdc
    app.kubernetes.io/version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0      # zero-downtime
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: fusion-cdc
        app.kubernetes.io/version: "2.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fusion-control-plane
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      # Spread replicas across zones
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: control-plane
      containers:
        - name: control-plane
          image: fusion/control-plane:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fusion-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fusion-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fusion-secrets
                  key: SECRET_KEY
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: fusion-secrets
                  key: ENCRYPTION_KEY
            - name: WORKER_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: fusion-secrets
                  key: WORKER_TOKEN_SECRET
          livenessProbe:
            httpGet:
              path: /api/v1/monitoring/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/monitoring/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/monitoring/health
              port: 8000
            failureThreshold: 12    # 12 × 10s = 120s for migrations to complete
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: fusion-control-plane-svc
  namespace: fusion
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: fusion-cdc
spec:
  selector:
    app.kubernetes.io/name: control-plane
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
# ── PodDisruptionBudget ───────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fusion-control-plane-pdb
  namespace: fusion
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
