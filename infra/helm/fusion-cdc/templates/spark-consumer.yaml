{{- if .Values.sparkConsumer.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "fusion-cdc.fullname" . }}-spark-checkpoints
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: spark-consumer
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.sparkConsumer.storage.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.sparkConsumer.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fusion-cdc.fullname" . }}-spark-consumer
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: spark-consumer
spec:
  {{- if not .Values.sparkConsumer.hpa.enabled }}
  replicas: {{ .Values.sparkConsumer.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fusion-cdc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: spark-consumer
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "fusion-cdc.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: spark-consumer
        {{- with .Values.sparkConsumer.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.sparkConsumer.config.metricsPort }}"
        prometheus.io/path: "/metrics"
        {{- with .Values.sparkConsumer.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fusion-cdc.workerServiceAccountName" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 90
      {{- with .Values.sparkConsumer.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: spark-consumer
          image: {{ include "fusion-cdc.image" (dict "global" .Values.global "image" .Values.sparkConsumer.image) }}
          imagePullPolicy: {{ .Values.sparkConsumer.image.pullPolicy }}
          {{- with .Values.sparkConsumer.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: spark-ui
              containerPort: {{ .Values.sparkConsumer.config.sparkUiPort }}
            - name: metrics
              containerPort: {{ .Values.sparkConsumer.config.metricsPort }}
          env:
            - name: CONTROL_PLANE_URL
              value: {{ include "fusion-cdc.controlPlaneURL" . | quote }}
            - name: SPARK_MASTER
              value: {{ .Values.sparkConsumer.config.sparkMaster | quote }}
            - name: SPARK_CHECKPOINT_DIR
              value: {{ .Values.sparkConsumer.config.sparkCheckpointDir | quote }}
            - name: CONSUMER_GROUP
              value: {{ .Values.sparkConsumer.config.consumerGroup | quote }}
            - name: WORKER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" . }}
                  key: WORKER_TOKEN
            {{- if or .Values.global.secrets.existingSecret .Values.global.secrets.redisUrl }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" . }}
                  key: REDIS_URL
            {{- else if .Values.externalRedis.url }}
            - name: REDIS_URL
              value: {{ .Values.externalRedis.url | quote }}
            {{- end }}
            {{- $kafkaBs := include "fusion-cdc.kafkaBootstrapServers" . -}}
            {{- if $kafkaBs }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ $kafkaBs | quote }}
            {{- end }}
            {{- include "fusion-cdc.renderEnv" (dict "env" .Values.sparkConsumer.env "extraEnv" .Values.sparkConsumer.extraEnv) | nindent 12 }}
          resources:
            {{- toYaml .Values.sparkConsumer.resources | nindent 12 }}
          volumeMounts:
            - name: spark-checkpoints
              mountPath: {{ .Values.sparkConsumer.config.sparkCheckpointDir }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: spark-checkpoints
          persistentVolumeClaim:
            claimName: {{ include "fusion-cdc.fullname" . }}-spark-checkpoints
        - name: tmp
          emptyDir: {}
      {{- with .Values.sparkConsumer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sparkConsumer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sparkConsumer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fusion-cdc.fullname" . }}-spark-consumer
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: spark-consumer
spec:
  type: ClusterIP
  selector:
    {{- include "fusion-cdc.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: spark-consumer
  ports:
    - name: spark-ui
      port: {{ .Values.sparkConsumer.config.sparkUiPort }}
      targetPort: spark-ui
    - name: metrics
      port: {{ .Values.sparkConsumer.config.metricsPort }}
      targetPort: metrics
{{- end }}
