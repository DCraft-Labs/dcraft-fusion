# Production values — pin digests, HPA, ingress, existingSecret.
# Replace digests and hostnames before applying.

global:
  edition: community
  imagePullSecrets:
    - name: ghcr-pull
  labels:
    env: production
  secrets:
    existingSecret: fusion-cdc-secrets
    createSecret: false

controlPlane:
  enabled: true
  replicaCount: 3
  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-control-plane
    tag: "1.1.1"
    # digest: sha256:REPLACE_ME
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  config:
    environment: production
    corsOrigins: "https://app.example.com"
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/limit-rps: "100"
    hosts:
      - host: api.example.com
        paths:
          - path: /api
            pathType: Prefix
    tls:
      - secretName: fusion-cdc-api-tls
        hosts:
          - api.example.com

cdcWorkers:
  enabled: true
  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-worker
    tag: "1.1.1"
    # digest: sha256:REPLACE_ME
  postgres:
    enabled: true
    replicas: 2
    storage: 20Gi
    storageClass: fast-ssd
  mysql:
    enabled: true
    replicas: 2
    storage: 20Gi
    storageClass: fast-ssd
  mongodb:
    enabled: true
    replicas: 2
    storage: 20Gi
    storageClass: fast-ssd

sparkConsumer:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-spark-consumer
    tag: "1.1.1"
    # digest: sha256:REPLACE_ME
  storage:
    size: 50Gi
    storageClass: fast-ssd
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi

frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-frontend
    tag: "1.1.1"
    # digest: sha256:REPLACE_ME
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: app.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: fusion-cdc-app-tls
        hosts:
          - app.example.com

transformWorker:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-transform-worker
    tag: "1.1.1"
    # digest: sha256:REPLACE_ME
  keda:
    enabled: false

monitoring:
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 10s
