# Resource 13: Secret
---
apiVersion: fusion.dcraft.io/v1
kind: ResourceDefinition
metadata:
  name: secret
spec:
  scope: Namespaced
  group: fusion.dcraft.io
  version: v1
  names:
    kind: Secret
    plural: secrets
    singular: secret
  
  specSchema:
    type: object
    required: [type, encryptedData]
    properties:
      type:
        type: string
        description: "Secret type (e.g., snowflake-credentials, api-key)"
      
      encryptedData:
        type: object
        description: "Encrypted key-value pairs"
      
      rotationPolicy:
        type: object
        properties:
          enabled:
            type: boolean
          intervalDays:
            type: integer
      
      lastRotated:
        type: string
        format: date-time
  
  statusSchema:
    type: object
    properties:
      expiresAt:
        type: string
        format: date-time
      
      rotationDue:
        type: boolean
  
  relationships: []
  
  versioning:
    strategy: immutable-revisions
    retentionPolicy:
      maxRevisions: 3
  
  audit:
    enabled: true
    logChanges: true
    retentionDays: 2555

