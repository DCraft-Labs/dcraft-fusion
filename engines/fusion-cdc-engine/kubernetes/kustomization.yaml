# ─────────────────────────────────────────────────────────────────────────────
# Fusion CDC Engine — Kustomize Root (shortcut to base)
# kubectl apply -k kubernetes/  => applies base with no overlay patches
#
# For environment-specific deploys, use overlays:
#   Local:      kubectl apply -k kubernetes/overlays/local/
#   Production: kubectl apply -k kubernetes/overlays/production/
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base
