# ─────────────────────────────────────────────────────────────────────────────
# Fusion CDC Engine — CD / Deploy Pipeline
# Triggered when a version tag (v*) is pushed to main.
# Jobs: build → push images → deploy to staging → smoke-test → deploy to prod
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: latest

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/fusion

jobs:
  # ── Build and push images ────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/control-plane
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cdc-worker
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/spark-consumer
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push control-plane
        uses: docker/build-push-action@v5
        with:
          context: fusion-cdc-engine
          file: fusion-cdc-engine/docker/Dockerfile.control-plane
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/control-plane:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push cdc-worker
        uses: docker/build-push-action@v5
        with:
          context: fusion-cdc-engine
          file: fusion-cdc-engine/docker/Dockerfile.cdc-worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/cdc-worker:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push spark-consumer
        uses: docker/build-push-action@v5
        with:
          context: fusion-cdc-engine
          file: fusion-cdc-engine/docker/Dockerfile.spark-consumer
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/spark-consumer:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: staging
      url: https://api-staging.dcraftfusion.io
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configure kubeconfig (staging)
        run: echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > /tmp/kubeconfig
        env:
          KUBECONFIG: /tmp/kubeconfig

      - name: Helm upgrade (staging)
        env:
          KUBECONFIG: /tmp/kubeconfig
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          helm upgrade --install fusion-staging \
            fusion-cdc-engine/helm/fusion-cdc/ \
            --namespace fusion-staging \
            --create-namespace \
            --values fusion-cdc-engine/helm/fusion-cdc/values.yaml \
            --set controlPlane.image.tag="${IMAGE_TAG}" \
            --set cdcWorkers.image.tag="${IMAGE_TAG}" \
            --set sparkConsumer.image.tag="${IMAGE_TAG}" \
            --set controlPlane.ingress.hosts[0].host="api-staging.dcraftfusion.io" \
            --set controlPlane.secrets.secretKey="${{ secrets.STAGING_SECRET_KEY }}" \
            --set controlPlane.secrets.encryptionKey="${{ secrets.STAGING_ENCRYPTION_KEY }}" \
            --set controlPlane.secrets.workerTokenSecret="${{ secrets.STAGING_WORKER_TOKEN_SECRET }}" \
            --set cdcWorkers.workerToken="${{ secrets.STAGING_WORKER_TOKEN }}" \
            --set global.databaseUrl="${{ secrets.STAGING_DATABASE_URL }}" \
            --wait \
            --timeout=5m

      - name: Smoke test staging
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl wait --for=condition=Available deploy/fusion-staging-control-plane \
            -n fusion-staging --timeout=120s
          kubectl port-forward svc/fusion-staging-control-plane-svc 8000:8000 \
            -n fusion-staging &
          sleep 5
          curl -f http://localhost:8000/api/v1/monitoring/health | grep '"status":"healthy"'
          echo "✅ Staging smoke test passed"

  # ── Deploy to Production ─────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://api.dcraftfusion.io
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configure kubeconfig (production)
        run: echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > /tmp/kubeconfig

      - name: Helm upgrade (production)
        env:
          KUBECONFIG: /tmp/kubeconfig
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          helm upgrade --install fusion-prod \
            fusion-cdc-engine/helm/fusion-cdc/ \
            --namespace fusion \
            --create-namespace \
            --values fusion-cdc-engine/helm/fusion-cdc/values.yaml \
            --set controlPlane.image.tag="${IMAGE_TAG}" \
            --set cdcWorkers.image.tag="${IMAGE_TAG}" \
            --set sparkConsumer.image.tag="${IMAGE_TAG}" \
            --set controlPlane.replicaCount=3 \
            --set controlPlane.secrets.secretKey="${{ secrets.PROD_SECRET_KEY }}" \
            --set controlPlane.secrets.encryptionKey="${{ secrets.PROD_ENCRYPTION_KEY }}" \
            --set controlPlane.secrets.workerTokenSecret="${{ secrets.PROD_WORKER_TOKEN_SECRET }}" \
            --set cdcWorkers.workerToken="${{ secrets.PROD_WORKER_TOKEN }}" \
            --set global.databaseUrl="${{ secrets.PROD_DATABASE_URL }}" \
            --wait \
            --timeout=10m

      - name: Verify rollout
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl rollout status deploy/fusion-prod-control-plane \
            -n fusion --timeout=300s
          echo "✅ Production deployment complete — tag: ${{ needs.build-push.outputs.image_tag }}"

      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Production deploy ${{ needs.build-push.outputs.image_tag }} — ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
