apiVersion: v2
name: dcraft-fusion
description: >
  DCraft Fusion control plane — kernel API and web UI.
  Optional Bitnami Postgres/Redis; disable and point at external services via values.
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - dcraft
  - fusion
  - control-plane
home: https://github.com/DCraft-Labs/dcraft-fusion
sources:
  - https://github.com/DCraft-Labs/dcraft-fusion
maintainers:
  - name: DCraft Labs
    email: platform@dcraftlabs.com
dependencies:
  - name: postgresql
    version: "^16.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "^19.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
