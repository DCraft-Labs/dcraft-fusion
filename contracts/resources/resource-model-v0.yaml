# DCraft Fusion - Core Resource Model V0
# Complete specification of all core resources
# Version: 0.1.0
# Status: FROZEN

# ============================================================================
# Resource 1: Pipeline
# ============================================================================
---
apiVersion: fusion.dcraft.io/v1
kind: ResourceDefinition
metadata:
  name: pipeline
spec:
  scope: Namespaced
  group: fusion.dcraft.io
  version: v1
  names:
    kind: Pipeline
    plural: pipelines
    singular: pipeline
    shortNames: [pipe, pl]
  
  # Spec fields
  specSchema:
    type: object
    required: [description, provider]
    properties:
      description:
        type: string
        description: "Human-readable description of the pipeline"
      
      schedule:
        type: object
        description: "Scheduling configuration"
        properties:
          cron:
            type: string
            description: "Cron expression (e.g., '0 2 * * *')"
          timezone:
            type: string
            description: "Timezone (e.g., 'America/Los_Angeles')"
            default: "UTC"
          enabled:
            type: boolean
            default: true
      
      provider:
        type: object
        required: [type]
        description: "Provider configuration"
        properties:
          type:
            type: string
            description: "Provider type (dbt, airflow, dagster, etc.)"
          version:
            type: string
            description: "Provider version"
          config:
            type: object
            description: "Provider-specific configuration"
      
      tasks:
        type: array
        description: "Pipeline tasks"
        items:
          type: object
          required: [name, type]
          properties:
            name:
              type: string
            type:
              type: string
              description: "Task type (sql, dbt-model, python, etc.)"
            dependsOn:
              type: array
              items:
                type: string
            config:
              type: object
            timeout:
              type: string
              description: "Task timeout (e.g., '3600s')"
      
      inputs:
        type: array
        description: "Input datasets"
        items:
          type: object
          required: [datasetRef, mode]
          properties:
            datasetRef:
              type: string
              description: "Reference to Dataset resource"
            mode:
              type: string
              enum: [read, readwrite]
      
      outputs:
        type: array
        description: "Output datasets"
        items:
          type: object
          required: [datasetRef, mode]
          properties:
            datasetRef:
              type: string
            mode:
              type: string
              enum: [write, readwrite]
      
      retryPolicy:
        type: object
        properties:
          maxRetries:
            type: integer
            default: 3
          backoff:
            type: string
            enum: [linear, exponential]
            default: exponential
          initialDelay:
            type: string
            default: "30s"
      
      timeout:
        type: string
        description: "Pipeline timeout (e.g., '3600s')"
        default: "3600s"
      
      notifications:
        type: object
        properties:
          onSuccess:
            type: array
            items:
              type: object
          onFailure:
            type: array
            items:
              type: object
      
      driftDetection:
        type: object
        properties:
          enabled:
            type: boolean
            default: true
          reconcileInterval:
            type: string
            default: "300s"
  
  # Status fields
  statusSchema:
    type: object
    properties:
      phase:
        type: string
        enum: [Pending, Running, Succeeded, Failed, Paused]
      
      observedGeneration:
        type: integer
        description: "Last spec generation reconciled"
      
      conditions:
        type: array
        items:
          type: object
          required: [type, status]
          properties:
            type:
              type: string
            status:
              type: string
              enum: ["True", "False", "Unknown"]
            reason:
              type: string
            message:
              type: string
            lastTransitionTime:
              type: string
              format: date-time
      
      lastExecution:
        type: object
        properties:
          runId:
            type: string
          startTime:
            type: string
            format: date-time
          endTime:
            type: string
            format: date-time
          status:
            type: string
          duration:
            type: string
      
      nextScheduledRun:
        type: string
        format: date-time
      
      providerStatus:
        type: object
        properties:
          syncedAt:
            type: string
            format: date-time
          externalId:
            type: string
          externalUrl:
            type: string
          driftDetected:
            type: boolean
  
  # Relationships
  relationships:
    - type: inputs
      target: Dataset
      cardinality: many-to-many
    - type: outputs
      target: Dataset
      cardinality: many-to-many
    - type: owner
      target: Owner
      cardinality: many-to-one
    - type: executions
      target: PipelineExecution
      cardinality: one-to-many
  
  # Versioning strategy
  versioning:
    strategy: immutable-revisions
    retentionPolicy:
      maxRevisions: 10
      compressAfterDays: 30
  
  # Audit
  audit:
    enabled: true
    logChanges: true
    retentionDays: 730

# ============================================================================
# Resource 2: Dataset
# ============================================================================
---
apiVersion: fusion.dcraft.io/v1
kind: ResourceDefinition
metadata:
  name: dataset
spec:
  scope: Namespaced
  group: fusion.dcraft.io
  version: v1
  names:
    kind: Dataset
    plural: datasets
    singular: dataset
    shortNames: [ds]
  
  specSchema:
    type: object
    required: [type, provider]
    properties:
      description:
        type: string
      
      type:
        type: string
        enum: [table, file, stream, model, view]
      
      provider:
        type: object
        required: [type]
        properties:
          type:
            type: string
          config:
            type: object
      
      schema:
        type: object
        properties:
          schemaVersionRef:
            type: string
            description: "Reference to SchemaVersion resource"
          inferSchema:
            type: boolean
            default: false
      
      quality:
        type: object
        properties:
          rules:
            type: array
            items:
              type: object
              properties:
                ruleRef:
                  type: string
      
      owner:
        type: object
        properties:
          ownerRef:
            type: string
      
      tags:
        type: array
        items:
          type: string
      
      retentionPolicy:
        type: object
        properties:
          days:
            type: integer
          action:
            type: string
            enum: [delete, archive]
            default: delete
      
      partitioning:
        type: object
        properties:
          type:
            type: string
            enum: [time, hash, range]
          column:
            type: string
          granularity:
            type: string
            enum: [hour, day, month, year]
  
  statusSchema:
    type: object
    properties:
      phase:
        type: string
        enum: [Active, Deprecated, Archived]
      
      observedGeneration:
        type: integer
      
      lastUpdated:
        type: string
        format: date-time
      
      rowCount:
        type: integer
      
      sizeBytes:
        type: integer
      
      schemaVersion:
        type: string
      
      qualityScore:
        type: number
        minimum: 0
        maximum: 1
      
      lineage:
        type: object
        properties:
          upstreamCount:
            type: integer
          downstreamCount:
            type: integer
      
      providerStatus:
        type: object
        properties:
          syncedAt:
            type: string
            format: date-time
          externalId:
            type: string
  
  relationships:
    - type: schemaVersion
      target: SchemaVersion
      cardinality: many-to-one
    - type: owner
      target: Owner
      cardinality: many-to-one
    - type: qualityRules
      target: DataQualityRule
      cardinality: many-to-many
    - type: producedBy
      target: Pipeline
      cardinality: many-to-many
      viaLineage: true
    - type: consumedBy
      target: Pipeline
      cardinality: many-to-many
      viaLineage: true
  
  versioning:
    strategy: immutable-revisions
    retentionPolicy:
      maxRevisions: 10
  
  audit:
    enabled: true
    logChanges: true
    retentionDays: 730

# ============================================================================
# Resource 3: DataQualityRule
# ============================================================================
---
apiVersion: fusion.dcraft.io/v1
kind: ResourceDefinition
metadata:
  name: dataqualityrule
spec:
  scope: Namespaced
  group: fusion.dcraft.io
  version: v1
  names:
    kind: DataQualityRule
    plural: dataqualityrules
    singular: dataqualityrule
    shortNames: [dqr, quality]
  
  specSchema:
    type: object
    required: [type, target]
    properties:
      description:
        type: string
      
      type:
        type: string
        enum: [freshness, null-check, uniqueness, range, custom-sql, schema-validation]
      
      severity:
        type: string
        enum: [critical, high, medium, low]
        default: medium
      
      schedule:
        type: object
        properties:
          cron:
            type: string
          timezone:
            type: string
            default: "UTC"
      
      target:
        type: object
        required: [datasetRef]
        properties:
          datasetRef:
            type: string
      
      config:
        type: object
        description: "Type-specific configuration"
      
      notifications:
        type: object
        properties:
          onFailure:
            type: array
            items:
              type: object
  
  statusSchema:
    type: object
    properties:
      phase:
        type: string
        enum: [Active, Paused, Disabled]
      
      observedGeneration:
        type: integer
      
      lastCheck:
        type: object
        properties:
          timestamp:
            type: string
            format: date-time
          result:
            type: string
            enum: [passed, failed, error]
          value:
            type: number
          threshold:
            type: number
          message:
            type: string
      
      passRate:
        type: number
        description: "Pass rate over last 30 days"
      
      consecutiveFailures:
        type: integer
  
  relationships:
    - type: target
      target: Dataset
      cardinality: many-to-one
  
  versioning:
    strategy: immutable-revisions
    retentionPolicy:
      maxRevisions: 5
  
  audit:
    enabled: true
    logChanges: true
    retentionDays: 730

# ============================================================================
# Resource 4: Owner
# ============================================================================
---
apiVersion: fusion.dcraft.io/v1
kind: ResourceDefinition
metadata:
  name: owner
spec:
  scope: Namespaced
  group: fusion.dcraft.io
  version: v1
  names:
    kind: Owner
    plural: owners
    singular: owner
  
  specSchema:
    type: object
    required: [displayName, type]
    properties:
      displayName:
        type: string
      
      type:
        type: string
        enum: [team, individual]
      
      contacts:
        type: array
        items:
          type: object
          required: [type, value]
          properties:
            type:
              type: string
              enum: [email, slack, pagerduty, phone]
            value:
              type: string
      
      members:
        type: array
        items:
          type: object
          required: [userId]
          properties:
            userId:
              type: string
            role:
              type: string
              enum: [lead, member]
  
  statusSchema:
    type: object
    properties:
      ownedDatasets:
        type: integer
      
      ownedPipelines:
        type: integer
      
      qualityScore:
        type: number
        description: "Average quality score of owned assets"
  
  relationships:
    - type: members
      target: User
      cardinality: many-to-many
  
  versioning:
    strategy: mutable
  
  audit:
    enabled: true
    logChanges: true
    retentionDays: 730

# ============================================================================
# Resource 5: Policy
# ============================================================================
---
apiVersion: fusion.dcraft.io/v1
kind: ResourceDefinition
metadata:
  name: policy
spec:
  scope: Namespaced
  group: fusion.dcraft.io
  version: v1
  names:
    kind: Policy
    plural: policies
    singular: policy
  
  specSchema:
    type: object
    required: [subjects, resources, actions]
    properties:
      description:
        type: string
      
      subjects:
        type: array
        description: "Who this policy applies to"
        items:
          type: object
          required: [type, ref]
          properties:
            type:
              type: string
              enum: [user, team, serviceAccount]
            ref:
              type: string
      
      resources:
        type: array
        description: "What resources this policy covers"
        items:
          type: object
          required: [type]
          properties:
            type:
              type: string
            namespaces:
              type: array
              items:
                type: string
            names:
              type: array
              items:
                type: string
      
      actions:
        type: array
        description: "What actions are allowed"
        items:
          type: string
          enum: [create, read, update, delete, list, execute, approve]
      
      effect:
        type: string
        enum: [allow, deny]
        default: allow
      
      conditions:
        type: array
        description: "ABAC conditions"
        items:
          type: object
          properties:
            attribute:
              type: string
            operator:
              type: string
              enum: [equals, notEquals, contains, notContains, in, notIn]
            value:
              type: string
  
  statusSchema:
    type: object
    properties:
      active:
        type: boolean
  
  relationships: []
  
  versioning:
    strategy: immutable-revisions
    retentionPolicy:
      maxRevisions: 10
  
  audit:
    enabled: true
    logChanges: true
    retentionDays: 2555  # 7 years for compliance

