{{- if and .Values.global.secrets.createSecret (not .Values.global.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fusion-cdc.fullname" . }}-secrets
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.global.secrets.databaseUrl | quote }}
  SECRET_KEY: {{ .Values.global.secrets.secretKey | quote }}
  ENCRYPTION_KEY: {{ .Values.global.secrets.encryptionKey | quote }}
  WORKER_TOKEN_SECRET: {{ .Values.global.secrets.workerTokenSecret | quote }}
  WORKER_TOKEN: {{ .Values.global.secrets.workerToken | quote }}
  {{- if or .Values.global.secrets.redisUrl .Values.externalRedis.url }}
  REDIS_URL: {{ include "fusion-cdc.redisUrl" . | quote }}
  {{- end }}
{{- end }}
