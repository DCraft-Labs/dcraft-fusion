# DCraft Fusion control plane â€” default values
# Never commit real passwords. Prefer global.secrets.existingSecret in production.

global:
  imageRegistry: ""
  imagePullSecrets: []
  labels: {}
  edition: community

  # Secrets pattern: use an existing Secret, or optionally create one from placeholders.
  secrets:
    # Name of a pre-created Secret (recommended). When set, the chart does not create secrets.
    existingSecret: ""
    # When true and existingSecret is empty, create a Secret from the keys below.
    # Leave password fields empty and inject via --set / -f / External Secrets.
    createSecret: false
    # Keys expected in the Secret (existing or created):
    #   POSTGRES_DSN
    #   FUSION_SEED_FOUNDER_EMAIL / FUSION_SEED_FOUNDER_PASSWORD
    #   FUSION_SEED_SUPERADMIN_EMAIL / FUSION_SEED_SUPERADMIN_PASSWORD
    #   FUSION_OIDC_PRIVATE_KEY_PEM (optional)
    postgresDsn: ""
    seedFounderEmail: founder@dcraftlabs.com
    seedFounderPassword: ""
    seedSuperadminEmail: superadmin@dcraftlabs.com
    seedSuperadminPassword: ""
    oidcPrivateKeyPem: ""

nameOverride: ""
fullnameOverride: ""

# External Postgres (required). Provide DSN via global.secrets.
# Example: postgres://fusion:CHANGE_ME@postgres.example:5432/fusion?sslmode=require

# External Redis address host:port (required for kernel).
externalRedis:
  addr: ""

# â”€â”€ Control plane kernel â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
controlPlaneKernel:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/dcraft-labs/dcraft-fusion-control-plane-kernel
    tag: "1.3.6"
    digest: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080
    annotations: {}

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  livenessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  # Non-secret config (also rendered into ConfigMap)
  config:
    fusionEnv: production
    # Community default: password login returning a JWT. Set to oidc for OIDC.
    # Set authMode: dev for local-dev / community deployments to bypass the
    # RS256 JWKS fetch on protected routes (see middleware.go). Production
    # deployments should keep authMode: password (or oidc) and rely on the
    # JWKS URL default below.
    authMode: password
    oidcIssuer: ""
    oidcAudience: dcraft-fusion
    # JWKS endpoint used to verify RS256 bearer tokens. Empty string is OK —
    # the configmap template auto-defaults to the in-cluster kernel service
    # URL (http://<release>-control-plane-kernel:8080/oidc/jwks). Override
    # only when pointing at an external IdP.
    oidcJwksUrl: ""

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

# â”€â”€ Web UI â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
web:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/dcraft-labs/dcraft-fusion-web
    tag: "1.3.6"
    digest: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80
    annotations: {}

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

  livenessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

# â”€â”€ Ingress â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: fusion.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: controlPlaneKernel
        - path: /healthz
          pathType: Prefix
          service: controlPlaneKernel
        - path: /oidc
          pathType: Prefix
          service: controlPlaneKernel
  tls: []
