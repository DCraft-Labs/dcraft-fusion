---
# Spec §5 (P5-6): ExternalSecret resources for Fusion CDC Engine
# Requires: External Secrets Operator (https://external-secrets.io/)
# Backend: AWS Secrets Manager (configurable via ClusterSecretStore)
#
# Install ESO:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace

# ---------------------------------------------------------------------------
# ClusterSecretStore: AWS Secrets Manager
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: fusion-aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: "${AWS_REGION}"          # injected from Helm values / kustomize overlay
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
# ---------------------------------------------------------------------------
# PostgreSQL control-plane database credentials
# AWS secret name: fusion/<env>/postgres
# Expected JSON: { "username": "...", "password": "...", "host": "...",
#                  "port": "5432", "dbname": "fusion" }
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fusion-postgres-secret
  namespace: fusion
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: fusion-aws-secretsmanager
  target:
    name: fusion-postgres-secret      # name of the resulting K8s Secret
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        DATABASE_URL: >-
          postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .dbname }}
        POSTGRES_USER:     "{{ .username }}"
        POSTGRES_PASSWORD: "{{ .password }}"
        POSTGRES_HOST:     "{{ .host }}"
        POSTGRES_PORT:     "{{ .port }}"
        POSTGRES_DB:       "{{ .dbname }}"
  data:
    - secretKey: username
      remoteRef:
        key: fusion/${ENV}/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: fusion/${ENV}/postgres
        property: password
    - secretKey: host
      remoteRef:
        key: fusion/${ENV}/postgres
        property: host
    - secretKey: port
      remoteRef:
        key: fusion/${ENV}/postgres
        property: port
    - secretKey: dbname
      remoteRef:
        key: fusion/${ENV}/postgres
        property: dbname
---
# ---------------------------------------------------------------------------
# Redis password
# AWS secret name: fusion/<env>/redis
# Expected JSON: { "password": "..." }
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fusion-redis-secret
  namespace: fusion
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: fusion-aws-secretsmanager
  target:
    name: fusion-redis-secret
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        REDIS_PASSWORD: "{{ .password }}"
        REDIS_URL: "rediss://:{{ .password }}@redis-service.fusion.svc.cluster.local:6379/0"
  data:
    - secretKey: password
      remoteRef:
        key: fusion/${ENV}/redis
        property: password
---
# ---------------------------------------------------------------------------
# CDC Worker shared secret (X-Worker-Token)
# AWS secret name: fusion/<env>/worker-token
# Expected JSON: { "token": "..." }
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fusion-worker-token-secret
  namespace: fusion
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: fusion-aws-secretsmanager
  target:
    name: fusion-worker-token-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        WORKER_SHARED_SECRET: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: fusion/${ENV}/worker-token
        property: token
---
# ---------------------------------------------------------------------------
# JWT signing secret (control-plane auth)
# AWS secret name: fusion/<env>/jwt
# Expected JSON: { "secret_key": "...", "algorithm": "HS256" }
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fusion-jwt-secret
  namespace: fusion
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: fusion-aws-secretsmanager
  target:
    name: fusion-jwt-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        JWT_SECRET_KEY: "{{ .secret_key }}"
        JWT_ALGORITHM:  "{{ .algorithm }}"
  data:
    - secretKey: secret_key
      remoteRef:
        key: fusion/${ENV}/jwt
        property: secret_key
    - secretKey: algorithm
      remoteRef:
        key: fusion/${ENV}/jwt
        property: algorithm
---
# ---------------------------------------------------------------------------
# Airflow API credentials (used by dag_generator for run-complete callbacks)
# AWS secret name: fusion/<env>/airflow
# Expected JSON: { "username": "...", "password": "...", "base_url": "..." }
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fusion-airflow-secret
  namespace: fusion
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: fusion-aws-secretsmanager
  target:
    name: fusion-airflow-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        AIRFLOW_USERNAME: "{{ .username }}"
        AIRFLOW_PASSWORD: "{{ .password }}"
        AIRFLOW_BASE_URL: "{{ .base_url }}"
  data:
    - secretKey: username
      remoteRef:
        key: fusion/${ENV}/airflow
        property: username
    - secretKey: password
      remoteRef:
        key: fusion/${ENV}/airflow
        property: password
    - secretKey: base_url
      remoteRef:
        key: fusion/${ENV}/airflow
        property: base_url
