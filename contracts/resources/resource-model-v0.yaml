# Resource 20: AuditLog
---
apiVersion: fusion.dcraft.io/v1
kind: ResourceDefinition
metadata:
  name: auditlog
spec:
  scope: Namespaced
  group: fusion.dcraft.io
  version: v1
  names:
    kind: AuditLog
    plural: auditlogs
    singular: auditlog
  
  specSchema:
    type: object
    required: [timestamp, actor, action, resource]
    properties:
      timestamp:
        type: string
        format: date-time
      
      actor:
        type: object
        required: [type, ref]
        properties:
          type:
            type: string
            enum: [user, serviceAccount, system]
          ref:
            type: string
      
      action:
        type: string
        enum: [CREATE, UPDATE, DELETE, APPROVE, EXECUTE]
      
      resource:
        type: object
        required: [type, ref]
        properties:
          type:
            type: string
          ref:
            type: string
          version:
            type: string
      
      changes:
        type: array
        items:
          type: object
          properties:
            field:
              type: string
            oldValue:
              type: string
            newValue:
              type: string
      
      ipAddress:
        type: string
      
      userAgent:
        type: string
  
  statusSchema:
    type: object
    properties:
      archived:
        type: boolean
  
  relationships: []
  
  versioning:
    strategy: immutable
  
  audit:
    enabled: false  # AuditLog itself is not audited
    logChanges: false
    retentionDays: 2555