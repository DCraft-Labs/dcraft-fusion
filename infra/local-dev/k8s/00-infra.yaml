# Local smoke stack: Postgres + Redis for DCraft Fusion / Fusion CDC
# Namespace: dcraft-local
---
apiVersion: v1
kind: Namespace
metadata:
  name: dcraft-local
---
apiVersion: v1
kind: Secret
metadata:
  name: fusion-secrets
  namespace: dcraft-local
type: Opaque
stringData:
  POSTGRES_DSN: postgres://fusion:fusion_local@postgres:5432/fusion?sslmode=disable
  FUSION_SEED_FOUNDER_EMAIL: founder@dcraftlabs.com
  FUSION_SEED_FOUNDER_PASSWORD: changeme-founder
  FUSION_SEED_SUPERADMIN_EMAIL: superadmin@dcraftlabs.com
  FUSION_SEED_SUPERADMIN_PASSWORD: changeme-superadmin
---
apiVersion: v1
kind: Secret
metadata:
  name: fusion-cdc-secrets
  namespace: dcraft-local
type: Opaque
stringData:
  DATABASE_URL: postgresql://fusion:fusion_local@postgres:5432/fusion_cdc_metadata
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: local-dev-secret-key-change-me
  ENCRYPTION_KEY: CHANGE_ME_ENCRYPTION_KEY_32C!!
  WORKER_TOKEN_SECRET: local-worker-token-secret
  WORKER_TOKEN: local-worker-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: dcraft-local
data:
  00-init.sql: |
    SELECT 'ok' WHERE current_database() = 'fusion';
    CREATE DATABASE fusion_cdc_metadata;
    -- CDC source DB (pg-source alias) — mirrors scripts/seed-admin.sql expectations.
    CREATE DATABASE source_db;
    CREATE DATABASE fusion_dw;
    DO $$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'cdc_user') THEN
        CREATE ROLE cdc_user WITH LOGIN REPLICATION PASSWORD 'cdc_password';
      END IF;
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'dw_user') THEN
        CREATE ROLE dw_user WITH LOGIN PASSWORD 'dw_password';
      END IF;
    END
    $$;
  01-source-db.sql: |
    \c source_db
    CREATE TABLE IF NOT EXISTS users (
      id SERIAL PRIMARY KEY,
      email TEXT NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    CREATE TABLE IF NOT EXISTS orders (
      id SERIAL PRIMARY KEY,
      user_id INTEGER REFERENCES users(id),
      amount NUMERIC(12,2) NOT NULL,
      created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    GRANT SELECT ON ALL TABLES IN SCHEMA public TO cdc_user;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO cdc_user;
    DROP PUBLICATION IF EXISTS fusion_pub;
    CREATE PUBLICATION fusion_pub FOR TABLE users, orders;
  02-fusion-dw.sql: |
    \c fusion_dw
    GRANT ALL ON SCHEMA public TO dw_user;
---
# ─────────────────────────────────────────────────────────────────────────────
# Postgres durability (local-dev)
#
# The Docker Desktop built-in `storage-provisioner` (kube-system) is unreliable
# under CPU pressure (CrashLoopBackOff, lost leader-election lease) and PVCs
# bound to a dynamic storage class stay Pending forever. To make postgres data
# durable across pod restarts without depending on the dynamic provisioner, we
# provision a hostPath PersistentVolume + a matching PersistentVolumeClaim.
#
# hostPath persists on the Docker Desktop VM's filesystem and survives pod
# deletes/recreates (though NOT a full Docker Desktop reset). This is a
# LOCAL-DEV-ONLY escape hatch. Production MUST use a real storage class or an
# external managed Postgres (RDS, Cloud SQL, etc.) — hostPath is single-node
# only and does not survive node replacement.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-data-pv
  namespace: dcraft-local
  labels:
    app: postgres
    dcraft.io/role: local-dev-storage
spec:
  capacity:
    storage: 5Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /var/dcraft-local/postgres-data
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: dcraft-local
  labels:
    app: postgres
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ""
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: postgres
      dcraft.io/role: local-dev-storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: dcraft-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          # wal_level=logical is required for the pg-source CDC connector
          # (pgoutput plugin + fusion_pub publication). Baked into the
          # command so it survives pod restarts even though there's no
          # postgresql.conf override file.
          args:
            - "-c"
            - "wal_level=logical"
            - "-c"
            - "max_wal_senders=10"
            - "-c"
            - "max_replication_slots=10"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: fusion
            - name: POSTGRES_USER
              value: fusion
            - name: POSTGRES_PASSWORD
              value: fusion_local
            # PGDATA must be a subdirectory of the mounted volume, not the
            # volume root, or postgres refuses to init when the dir has perms
            # it doesn't expect.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: init
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "fusion", "-d", "fusion"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "fusion", "-d", "fusion"]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: init
          configMap:
            name: postgres-init
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dcraft-local
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dcraft-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: dcraft-local
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
# nginx upstream aliases baked into published images (DNS names != Helm service names)
apiVersion: v1
kind: Service
metadata:
  name: control-plane-kernel
  namespace: dcraft-local
spec:
  type: ExternalName
  externalName: fusion-dcraft-fusion-control-plane-kernel.dcraft-local.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: fusion-control-plane-svc
  namespace: dcraft-local
spec:
  type: ExternalName
  externalName: fusion-cdc-control-plane.dcraft-local.svc.cluster.local
---
# pg-source alias: the seed-admin.sql source DSN is pg-source:5432/source_db.
# Alias to the shared postgres service so the DSN resolves without a second
# Postgres deployment. The source_db database is created by deploy.ps1.
apiVersion: v1
kind: Service
metadata:
  name: pg-source
  namespace: dcraft-local
spec:
  type: ExternalName
  externalName: postgres.dcraft-local.svc.cluster.local
---
# postgres-dest alias: the seed-admin.sql destination DSN is postgres-dest:5432/fusion_dw.
apiVersion: v1
kind: Service
metadata:
  name: postgres-dest
  namespace: dcraft-local
spec:
  type: ExternalName
  externalName: postgres.dcraft-local.svc.cluster.local
