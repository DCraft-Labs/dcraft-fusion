apiVersion: v2
name: fusion-cdc
description: >
  Fusion CDC Engine — multi-tenant Change Data Capture platform.
  Deploys control-plane, cdc-workers, spark-consumer, frontend, optional transform-worker, and Redis.
type: application
version: 2.0.0
appVersion: "2.0.0"
keywords:
  - cdc
  - change-data-capture
  - kafka
  - streaming
  - multi-tenant
home: https://github.com/DCraft-Labs/dcraft-fusion
sources:
  - https://github.com/DCraft-Labs/dcraft-fusion
maintainers:
  - name: DCraft Fusion Platform Team
    email: platform@dcraftlabs.com
dependencies:
  - name: redis
    version: "^19.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
