{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-control-plane
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}-control-plane
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-control-plane
        app.kubernetes.io/component: control-plane
        {{- include "fusion-cdc.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.controlPlane.service.port }}"
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Release.Name }}-control-plane-sa
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - {{ toYaml . | nindent 10 }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ $.Release.Name }}-control-plane
        {{- end }}
      {{- end }}
      containers:
        - name: control-plane
          image: {{ include "fusion-cdc.controlPlaneImage" . }}
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.service.port }}
          env:
            - name: LOG_LEVEL
              value: {{ .Values.controlPlane.config.logLevel | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.controlPlane.config.environment | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.controlPlane.config.corsOrigins | quote }}
            - name: REDIS_URL
              value: "redis://{{ include "fusion-cdc.redisHost" . }}:6379/0"
            - name: CONTROL_PLANE_URL
              value: {{ include "fusion-cdc.controlPlaneURL" . | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: SECRET_KEY
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: ENCRYPTION_KEY
            - name: WORKER_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: WORKER_TOKEN_SECRET
          livenessProbe:
            httpGet:
              path: /api/v1/monitoring/health
              port: {{ .Values.controlPlane.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/monitoring/health
              port: {{ .Values.controlPlane.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/monitoring/health
              port: {{ .Values.controlPlane.service.port }}
            failureThreshold: 12
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-control-plane-svc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}-control-plane
  ports:
    - name: http
      port: {{ .Values.controlPlane.service.port }}
      targetPort: {{ .Values.controlPlane.service.port }}
  type: {{ .Values.controlPlane.service.type }}
---
{{- if .Values.controlPlane.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-control-plane-hpa
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-control-plane
  minReplicas: {{ .Values.controlPlane.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.controlPlane.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.controlPlane.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.controlPlane.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
---
{{- if .Values.controlPlane.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-control-plane-pdb
  namespace: {{ .Release.Namespace }}
spec:
  minAvailable: {{ .Values.controlPlane.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}-control-plane
{{- end }}
{{- end }}
