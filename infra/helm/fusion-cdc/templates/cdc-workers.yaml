{{/*
CDC Worker StatefulSet — one per enabled source type (image-only).
*/}}
{{- define "fusion-cdc.workerStatefulSet" -}}
{{- $root := index . 0 -}}
{{- $sourceType := index . 1 -}}
{{- $cfg := index . 2 -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "fusion-cdc.fullname" $root }}-cdc-worker-{{ $sourceType }}
  labels:
    {{- include "fusion-cdc.labels" $root | nindent 4 }}
    app.kubernetes.io/component: cdc-worker
    cdc.dcraftfusion.io/source-type: {{ $sourceType }}
spec:
  serviceName: {{ include "fusion-cdc.fullname" $root }}-cdc-worker-{{ $sourceType }}-headless
  replicas: {{ $cfg.replicas }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "fusion-cdc.selectorLabels" $root | nindent 6 }}
      app.kubernetes.io/component: cdc-worker
      cdc.dcraftfusion.io/source-type: {{ $sourceType }}
  template:
    metadata:
      labels:
        {{- include "fusion-cdc.selectorLabels" $root | nindent 8 }}
        app.kubernetes.io/component: cdc-worker
        cdc.dcraftfusion.io/source-type: {{ $sourceType }}
        {{- with $root.Values.cdcWorkers.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $root.Values.cdcWorkers.metricsPort }}"
        prometheus.io/path: "/metrics"
        {{- with $root.Values.cdcWorkers.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with $root.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fusion-cdc.cdcWorkers.serviceAccountName" $root }}
      automountServiceAccountToken: {{ $root.Values.cdcWorkers.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: 60
      {{- with $root.Values.cdcWorkers.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: cdc-worker
          image: {{ include "fusion-cdc.image" (dict "global" $root.Values.global "image" $root.Values.cdcWorkers.image "ctx" $root) }}
          imagePullPolicy: {{ $root.Values.cdcWorkers.image.pullPolicy }}
          {{- with $root.Values.cdcWorkers.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ $root.Values.cdcWorkers.metricsPort }}
          env:
            - name: CDC_SOURCE_TYPE
              value: {{ $sourceType | quote }}
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CONTROL_PLANE_URL
              value: {{ include "fusion-cdc.controlPlaneURL" $root | quote }}
            - name: METRICS_PORT
              value: {{ $root.Values.cdcWorkers.metricsPort | quote }}
            - name: WORKER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" $root }}
                  key: WORKER_TOKEN
            {{- if or $root.Values.global.secrets.existingSecret $root.Values.global.secrets.redisUrl }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" $root }}
                  key: REDIS_URL
            {{- else if $root.Values.externalRedis.url }}
            - name: REDIS_URL
              value: {{ $root.Values.externalRedis.url | quote }}
            {{- end }}
            {{- include "fusion-cdc.renderEnv" (dict "env" $root.Values.cdcWorkers.env "extraEnv" $root.Values.cdcWorkers.extraEnv) | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
          volumeMounts:
            - name: cdc-data
              mountPath: /var/lib/cdc
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with $root.Values.cdcWorkers.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.cdcWorkers.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.cdcWorkers.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: cdc-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with $cfg.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ $cfg.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fusion-cdc.fullname" $root }}-cdc-worker-{{ $sourceType }}-headless
  labels:
    {{- include "fusion-cdc.labels" $root | nindent 4 }}
    app.kubernetes.io/component: cdc-worker
    cdc.dcraftfusion.io/source-type: {{ $sourceType }}
spec:
  clusterIP: None
  selector:
    {{- include "fusion-cdc.selectorLabels" $root | nindent 4 }}
    app.kubernetes.io/component: cdc-worker
    cdc.dcraftfusion.io/source-type: {{ $sourceType }}
  ports:
    - name: metrics
      port: {{ $root.Values.cdcWorkers.metricsPort }}
      targetPort: metrics
{{- end }}

{{- if and .Values.cdcWorkers.enabled .Values.cdcWorkers.postgres.enabled }}
{{ include "fusion-cdc.workerStatefulSet" (list . "postgres" .Values.cdcWorkers.postgres) }}
{{- end }}

{{- if and .Values.cdcWorkers.enabled .Values.cdcWorkers.mysql.enabled }}
{{ include "fusion-cdc.workerStatefulSet" (list . "mysql" .Values.cdcWorkers.mysql) }}
{{- end }}

{{- if and .Values.cdcWorkers.enabled .Values.cdcWorkers.mongodb.enabled }}
{{ include "fusion-cdc.workerStatefulSet" (list . "mongodb" .Values.cdcWorkers.mongodb) }}
{{- end }}
