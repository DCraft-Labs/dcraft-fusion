apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-kernel
  namespace: dcraft-fusion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane-kernel
  template:
    metadata:
      labels:
        app: control-plane-kernel
    spec:
      containers:
        - name: control-plane-kernel
          image: ghcr.io/dcraft-labs/dcraft-fusion-control-plane-kernel:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: FUSION_ENV
              valueFrom:
                configMapKeyRef:
                  name: fusion-config
                  key: FUSION_ENV
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: fusion-secrets
                  key: POSTGRES_DSN
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: fusion-config
                  key: REDIS_ADDR
            - name: FUSION_AUTH_MODE
              valueFrom:
                configMapKeyRef:
                  name: fusion-config
                  key: FUSION_AUTH_MODE
            - name: FUSION_OIDC_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: fusion-config
                  key: FUSION_OIDC_ISSUER
            - name: FUSION_OIDC_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: fusion-config
                  key: FUSION_OIDC_AUDIENCE
            - name: FUSION_OIDC_JWKS_URL
              valueFrom:
                configMapKeyRef:
                  name: fusion-config
                  key: FUSION_OIDC_JWKS_URL
            - name: FUSION_OIDC_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: fusion-secrets
                  key: FUSION_OIDC_PRIVATE_KEY_PEM
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane-kernel
  namespace: dcraft-fusion
spec:
  selector:
    app: control-plane-kernel
  ports:
    - port: 8080
      targetPort: 8080
