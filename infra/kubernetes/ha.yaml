apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: control-plane-kernel
  namespace: dcraft-fusion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: control-plane-kernel
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
  namespace: dcraft-fusion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: control-plane-kernel
  namespace: dcraft-fusion
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: control-plane-kernel
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web
  namespace: dcraft-fusion
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: web
