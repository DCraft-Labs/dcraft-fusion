# Fusion CDC local profile — official GHCR images only.
#
# CDC engine source is proprietary. This compose file pulls pre-built images
# from ghcr.io/dcraft-labs/fusion-cdc-* (no build: contexts).
#
# Usage (from repo root):
#   docker compose -f infra/local-dev/docker-compose.cdc.yml --profile cdc up -d
#
# Alongside Fusion control-plane compose:
#   docker compose -f infra/local-dev/docker-compose.yml \
#     -f infra/local-dev/docker-compose.cdc.yml --profile cdc up -d
#
# Set GHCR_TOKEN / docker login if images are private:
#   echo $GHCR_TOKEN | docker login ghcr.io -u USERNAME --password-stdin

name: dcraft-local

services:
  cdc-postgres-meta:
    profiles: [cdc]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fusion_user
      POSTGRES_PASSWORD: ${CDC_POSTGRES_PASSWORD:-CHANGE_ME}
      POSTGRES_DB: fusion_cdc_metadata
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fusion_user -d fusion_cdc_metadata"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - fusion-cdc-postgres-meta:/var/lib/postgresql

  cdc-redis:
    profiles: [cdc]
    image: redis:7.2-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  cdc-control-plane:
    profiles: [cdc]
    image: ghcr.io/dcraft-labs/fusion-cdc-control-plane:latest
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: local
      DATABASE_URL: postgresql://fusion_user:${CDC_POSTGRES_PASSWORD:-CHANGE_ME}@cdc-postgres-meta:5432/fusion_cdc_metadata
      REDIS_URL: redis://cdc-redis:6379/0
      SECRET_KEY: ${CDC_SECRET_KEY:-CHANGE_ME_SECRET_KEY}
      ENCRYPTION_KEY: ${CDC_ENCRYPTION_KEY:-CHANGE_ME_ENCRYPTION_KEY_32C}
      WORKER_TOKEN_SECRET: ${CDC_WORKER_TOKEN_SECRET:-CHANGE_ME_WORKER_SECRET}
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      cdc-postgres-meta:
        condition: service_healthy
      cdc-redis:
        condition: service_healthy

  cdc-worker:
    profiles: [cdc]
    image: ghcr.io/dcraft-labs/fusion-cdc-worker:latest
    environment:
      CONTROL_PLANE_URL: http://cdc-control-plane:8000
      WORKER_TOKEN: ${CDC_WORKER_TOKEN:-CHANGE_ME_WORKER_TOKEN}
      WORKER_ID: worker-local-1
      REDIS_URL: redis://cdc-redis:6379/0
      CHECKPOINT_DB_PATH: /var/lib/cdc/checkpoints.db
      FALLBACK_DB_PATH: /var/lib/cdc/fallback.db
      HTTP_PORT: "8081"
      ENCRYPTION_KEY: ${CDC_ENCRYPTION_KEY:-CHANGE_ME_ENCRYPTION_KEY_32C}
    ports:
      - "8081:8081"
    depends_on:
      cdc-control-plane:
        condition: service_started
      cdc-redis:
        condition: service_healthy
    volumes:
      - fusion-cdc-worker-data:/var/lib/cdc

# Default CDC profile — no Spark.
# Spark is optional / legacy; enable with --profile cdc-spark if you ever need it.

  cdc-transform-worker:
    profiles: [cdc]
    image: ghcr.io/dcraft-labs/fusion-cdc-transform-worker:latest
    environment:
      METADATA_DB_DSN: host=cdc-postgres-meta port=5432 dbname=fusion_cdc_metadata user=fusion_user password=${CDC_POSTGRES_PASSWORD:-CHANGE_ME}
      REDIS_URL: redis://cdc-redis:6379/0
      ENCRYPTION_KEY: ${CDC_ENCRYPTION_KEY:-CHANGE_ME_ENCRYPTION_KEY_32C}
      CONTROL_PLANE_URL: http://cdc-control-plane:8000
      WORKER_TOKEN: ${CDC_WORKER_TOKEN:-CHANGE_ME_WORKER_TOKEN}
      WORKER_ID: transform-worker-local-1
    depends_on:
      cdc-postgres-meta:
        condition: service_healthy
      cdc-redis:
        condition: service_healthy
      cdc-control-plane:
        condition: service_started

  # Optional Spark landing path (not recommended — prefer transform-worker / DuckDB).
  cdc-spark-consumer:
    profiles: [cdc-spark]
    image: ghcr.io/dcraft-labs/fusion-cdc-spark-consumer:latest
    environment:
      REDIS_URL: redis://cdc-redis:6379/0
      CONTROL_PLANE_URL: http://cdc-control-plane:8000
      WORKER_TOKEN: ${CDC_WORKER_TOKEN:-CHANGE_ME_WORKER_TOKEN}
      SPARK_CHECKPOINT_DIR: /tmp/spark-checkpoints
      CONSUMER_GROUP: fusion-spark
      CONSUMER_NAME: spark-consumer-local-1
    depends_on:
      cdc-redis:
        condition: service_healthy
      cdc-control-plane:
        condition: service_started
    volumes:
      - fusion-cdc-spark-checkpoints:/tmp/spark-checkpoints

  cdc-frontend:
    profiles: [cdc]
    image: ghcr.io/dcraft-labs/fusion-cdc-frontend:latest
    ports:
      - "8088:8080"
    depends_on:
      - cdc-control-plane

volumes:
  fusion-cdc-postgres-meta:
  fusion-cdc-worker-data:
  fusion-cdc-spark-checkpoints:
