{{- if .Values.transformWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fusion-cdc.fullname" . }}-transform-worker
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: transform-worker
spec:
  {{- if and (not .Values.transformWorker.hpa.enabled) (not .Values.transformWorker.keda.enabled) }}
  replicas: {{ .Values.transformWorker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fusion-cdc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: transform-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 10
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "fusion-cdc.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: transform-worker
        {{- with .Values.transformWorker.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
        {{- with .Values.transformWorker.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fusion-cdc.workerServiceAccountName" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120
      {{- with .Values.transformWorker.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: transform-worker
          image: {{ include "fusion-cdc.image" (dict "global" .Values.global "image" .Values.transformWorker.image "ctx" .) }}
          imagePullPolicy: {{ .Values.transformWorker.image.pullPolicy }}
          {{- with .Values.transformWorker.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" . }}
                  key: DATABASE_URL
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" . }}
                  key: ENCRYPTION_KEY
            - name: CONTROL_PLANE_URL
              value: {{ include "fusion-cdc.controlPlaneURL" . | quote }}
            - name: WORKER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" . }}
                  key: WORKER_TOKEN
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: HIGH_PRIORITY_QUEUE
              value: {{ .Values.transformWorker.config.highPriorityQueue | quote }}
            - name: NORMAL_PRIORITY_QUEUE
              value: {{ .Values.transformWorker.config.normalPriorityQueue | quote }}
            - name: DUCKDB_THREADS
              value: {{ .Values.transformWorker.config.duckdbThreads | quote }}
            - name: DUCKDB_MEMORY_LIMIT
              value: {{ .Values.transformWorker.config.duckdbMemoryLimit | quote }}
            {{- if or .Values.global.secrets.existingSecret .Values.global.secrets.redisUrl }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-cdc.secretName" . }}
                  key: REDIS_URL
            {{- else if .Values.externalRedis.url }}
            - name: REDIS_URL
              value: {{ .Values.externalRedis.url | quote }}
            {{- end }}
            {{- include "fusion-cdc.renderEnv" (dict "env" .Values.transformWorker.env "extraEnv" .Values.transformWorker.extraEnv) | nindent 12 }}
          volumeMounts:
            - name: duckdb-scratch
              mountPath: /tmp/duckdb
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.transformWorker.resources | nindent 12 }}
      volumes:
        - name: duckdb-scratch
          emptyDir:
            sizeLimit: 10Gi
        - name: tmp
          emptyDir: {}
      {{- with .Values.transformWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.transformWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.transformWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.transformWorker.keda.enabled }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "fusion-cdc.fullname" . }}-transform-worker
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "fusion-cdc.fullname" . }}-transform-worker
  minReplicaCount: {{ .Values.transformWorker.keda.minReplicaCount }}
  maxReplicaCount: {{ .Values.transformWorker.keda.maxReplicaCount }}
  cooldownPeriod: {{ .Values.transformWorker.keda.cooldownPeriod }}
  pollingInterval: {{ .Values.transformWorker.keda.pollingInterval }}
  triggers:
    - type: redis
      metadata:
        address: {{ regexReplaceAll "^redis://([^/]+).*$" (include "fusion-cdc.redisUrl" .) "${1}" | default "redis:6379" }}
        listName: {{ .Values.transformWorker.config.highPriorityQueue }}
        listLength: "1"
    - type: redis
      metadata:
        address: {{ regexReplaceAll "^redis://([^/]+).*$" (include "fusion-cdc.redisUrl" .) "${1}" | default "redis:6379" }}
        listName: {{ .Values.transformWorker.config.normalPriorityQueue }}
        listLength: "5"
{{- end }}
{{- end }}
