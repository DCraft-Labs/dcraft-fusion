apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dcraft-fusion.fullname" . }}-config
  labels:
    {{- include "dcraft-fusion.labels" . | nindent 4 }}
data:
  FUSION_ENV: {{ .Values.controlPlaneKernel.config.fusionEnv | quote }}
  FUSION_AUTH_MODE: {{ .Values.controlPlaneKernel.config.authMode | quote }}
  FUSION_OIDC_ISSUER: {{ .Values.controlPlaneKernel.config.oidcIssuer | quote }}
  FUSION_OIDC_AUDIENCE: {{ .Values.controlPlaneKernel.config.oidcAudience | quote }}
  FUSION_OIDC_JWKS_URL: {{ .Values.controlPlaneKernel.config.oidcJwksUrl | quote }}
  REDIS_ADDR: {{ include "dcraft-fusion.redisAddr" . | quote }}
