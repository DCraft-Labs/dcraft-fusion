server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://control-plane-kernel:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /.well-known/ {
    proxy_pass http://control-plane-kernel:8080/.well-known/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /oidc/ {
    proxy_pass http://control-plane-kernel:8080/oidc/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /healthz {
    proxy_pass http://control-plane-kernel:8080/healthz;
    proxy_set_header Host $host;
  }

  location /metrics {
    proxy_pass http://control-plane-kernel:8080/metrics;
    proxy_set_header Host $host;
  }
}
