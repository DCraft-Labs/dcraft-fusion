---
# ── HPA — CDC Workers scale on custom metric: cdc_stream_lag_seconds ─────────
# Requires: Prometheus Adapter (custom.metrics.k8s.io) installed in the cluster
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cdc-worker-postgres-hpa
  namespace: fusion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: cdc-worker-postgres
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Custom metric: scale when stream lag exceeds 10s
    - type: Pods
      pods:
        metric:
          name: cdc_stream_lag_seconds
        target:
          type: AverageValue
          averageValue: "10"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600   # 10 min before scale-down
