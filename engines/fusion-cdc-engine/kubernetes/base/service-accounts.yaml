# ─────────────────────────────────────────────────────────────────────────────
# Fusion CDC Engine — Service Accounts + RBAC
# ─────────────────────────────────────────────────────────────────────────────

# ── Service Accounts ─────────────────────────────────────────────────────────

apiVersion: v1
kind: ServiceAccount
metadata:
  name: fusion-control-plane
  namespace: fusion
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: fusion-cdc
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fusion-cdc-worker
  namespace: fusion
  labels:
    app.kubernetes.io/name: cdc-worker
    app.kubernetes.io/part-of: fusion-cdc
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fusion-cdc-consumer
  namespace: fusion
  labels:
    app.kubernetes.io/name: cdc-consumer
    app.kubernetes.io/part-of: fusion-cdc
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fusion-transform-worker
  namespace: fusion
  labels:
    app.kubernetes.io/name: transform-worker
    app.kubernetes.io/part-of: fusion-cdc
automountServiceAccountToken: false

# ── Roles ─────────────────────────────────────────────────────────────────────

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fusion-control-plane-role
  namespace: fusion
rules:
  # Read own ConfigMaps and Secrets (for config hot-reload)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # Read pod status and logs (monitoring)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fusion-cdc-worker-role
  namespace: fusion
rules:
  # Workers read their own ConfigMap
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

# ── RoleBindings ──────────────────────────────────────────────────────────────

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fusion-control-plane-binding
  namespace: fusion
subjects:
  - kind: ServiceAccount
    name: fusion-control-plane
    namespace: fusion
roleRef:
  kind: Role
  name: fusion-control-plane-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fusion-cdc-worker-binding
  namespace: fusion
subjects:
  - kind: ServiceAccount
    name: fusion-cdc-worker
    namespace: fusion
roleRef:
  kind: Role
  name: fusion-cdc-worker-role
  apiGroup: rbac.authorization.k8s.io
