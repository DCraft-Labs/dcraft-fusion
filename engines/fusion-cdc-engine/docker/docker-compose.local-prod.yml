# ─────────────────────────────────────────────────────────────────────────────
# Fusion — Local Prod-Like Docker Compose
#
# Mirrors the K8s production setup as closely as possible:
#   - Control-plane: pre-built image from Docker Hub (same as K8s)
#   - Frontend: nginx SPA + /api/ proxy → control-plane
#   - PostgreSQL: metadata DB on port 5432
#   - Redis: event transport on port 6379 (no password locally)
#   - db-seed: one-shot container that creates the admin user after migrations
#
# Quick start:
#   cd fusion-cdc-engine
#   docker compose -f docker/docker-compose.local-prod.yml --env-file .env.local up -d
#   # Frontend → http://localhost:8080   Login: admin / Admin@123
#   # Control-plane API → http://localhost:8000/api/v1/monitoring/health
#
# Stop:
#   docker compose -f docker/docker-compose.local-prod.yml --env-file .env.local down
#
# Rebuild (after code changes):
#   docker compose -f docker/docker-compose.local-prod.yml --env-file .env.local build frontend
#   docker compose -f docker/docker-compose.local-prod.yml --env-file .env.local up -d --no-deps frontend
# ─────────────────────────────────────────────────────────────────────────────

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
  interval: 5s
  timeout: 3s
  retries: 20

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── PostgreSQL — control-plane metadata DB ──────────────────────────────────
  postgres-meta:
    image: postgres:16-alpine
    container_name: fusion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_DB_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    healthcheck: *postgres-healthcheck
    logging: *default-logging
    networks:
      - fusion-net

  # ── Redis — event transport ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: fusion-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging
    networks:
      - fusion-net

  # ── Control Plane — FastAPI (built locally for native ARM64 on Mac) ─────────
  # Runs: alembic upgrade head → uvicorn
  fusion-control-plane:
    build:
      context: ..
      dockerfile: docker/Dockerfile.control-plane
    image: fusion/control-plane:local
    container_name: fusion-control-plane
    restart: unless-stopped
    depends_on:
      postgres-meta:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Postgres — same env var names as K8s
      POSTGRES_DB_USERNAME: ${POSTGRES_DB_USERNAME}
      POSTGRES_DB_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      # Redis
      REDIS_URL: ${REDIS_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT & encryption
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Worker auth
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET}
      # Application
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10
    logging: *default-logging
    networks:
      - fusion-net

  # ── DB Seed — inserts admin user once migrations have run ───────────────────
  db-seed:
    image: postgres:16-alpine
    container_name: fusion-db-seed
    restart: "no"
    depends_on:
      fusion-control-plane:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_DB_PASSWORD}
    volumes:
      - ../scripts/seed-admin.sql:/seed-admin.sql:ro
    command: ["psql", "-h", "postgres-meta", "-U", "${POSTGRES_DB_USERNAME}", "-d", "${POSTGRES_DB}", "-f", "/seed-admin.sql"]
    networks:
      - fusion-net

  # ── Frontend — React SPA + nginx proxy ─────────────────────────────────────
  # nginx proxies /api/ → http://fusion-control-plane:8000/api/
  # The service name "fusion-control-plane" matches what is hardcoded in
  # the Dockerfile.frontend nginx config.
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    image: fusion/frontend:local
    container_name: fusion-frontend
    restart: unless-stopped
    depends_on:
      fusion-control-plane:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging: *default-logging
    networks:
      - fusion-net

volumes:
  postgres-local-data:
    driver: local

networks:
  fusion-net:
    driver: bridge
