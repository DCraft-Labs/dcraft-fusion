{{- if .Values.controlPlane.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-cdc.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.controlPlane.secrets.secretKey | quote }}
  ENCRYPTION_KEY: {{ .Values.controlPlane.secrets.encryptionKey | quote }}
  WORKER_TOKEN_SECRET: {{ .Values.controlPlane.secrets.workerTokenSecret | quote }}
  WORKER_TOKEN: {{ .Values.cdcWorkers.workerToken | quote }}
  DATABASE_URL: {{ .Values.global.databaseUrl | default "postgresql://fusion_user:fusion_password@postgres:5432/fusion_cdc_metadata" | quote }}
{{- end }}
