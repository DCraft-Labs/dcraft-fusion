# DCraft Fusion — default values
# Override secrets via --set, -f secrets.yaml, or an existing Secret (secrets.existingSecret).

global:
  imageRegistry: ""
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ── Control plane kernel ──────────────────────────────────────────────────────
controlPlaneKernel:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/dcraft-labs/dcraft-fusion-control-plane-kernel
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  config:
    fusionEnv: production
    # Community default: password login returning a JWT.
    # Set to oidc for Enterprise-style OIDC.
    authMode: password
    oidcIssuer: ""
    oidcAudience: dcraft-fusion
    oidcJwksUrl: ""

# ── Web UI ────────────────────────────────────────────────────────────────────
web:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/dcraft-labs/dcraft-fusion-web
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# ── Secrets ───────────────────────────────────────────────────────────────────
# Prefer existingSecret in production. Do not commit real PEMs or passwords.
secrets:
  create: true
  # existingSecret: fusion-secrets
  # Seed passwords for FUSION_AUTH_MODE=password (change in production).
  seedFounderEmail: founder@dcraftlabs.com
  seedFounderPassword: ""
  seedSuperadminEmail: superadmin@dcraftlabs.com
  seedSuperadminPassword: ""
  # Optional OIDC private key PEM. Leave empty to auto-generate at runtime.
  oidcPrivateKeyPem: ""
  # Used when postgresql.enabled=false — full DSN for an external database.
  postgresDsn: ""

# ── External / bundled Postgres ───────────────────────────────────────────────
# When postgresql.enabled=false, set secrets.postgresDsn (or existingSecret POSTGRES_DSN).
# Example external DSN:
#   postgres://fusion:CHANGE_ME@my-postgres:5432/fusion?sslmode=require
postgresql:
  enabled: true
  auth:
    username: fusion
    password: ""   # set via --set or secrets file; required when enabled
    database: fusion
  primary:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ── External / bundled Redis ──────────────────────────────────────────────────
# When redis.enabled=false, set redis.externalAddr (host:port).
redis:
  enabled: true
  externalAddr: ""
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: fusion.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: controlPlaneKernel
        - path: /healthz
          pathType: Prefix
          service: controlPlaneKernel
        - path: /oidc
          pathType: Prefix
          service: controlPlaneKernel
  tls: []
