# Fusion CDC — image-only chart (public)
# CDC engine source is proprietary. This chart deploys official DCraft Labs images from GHCR.
# Never commit real passwords. Prefer global.secrets.existingSecret.

global:
  imageRegistry: ""
  imagePullSecrets: []
  labels: {}
  edition: community

  secrets:
    # Pre-created Secret name (recommended). When set, the chart does not create secrets.
    existingSecret: ""
    # When true and existingSecret is empty, create a Secret from placeholders below.
    createSecret: false
    # Keys expected:
    #   DATABASE_URL, SECRET_KEY, ENCRYPTION_KEY, WORKER_TOKEN_SECRET, WORKER_TOKEN
    #   REDIS_URL (optional if externalRedis.url is set in ConfigMap path)
    databaseUrl: ""
    secretKey: ""
    encryptionKey: ""
    workerTokenSecret: ""
    workerToken: ""
    redisUrl: ""

nameOverride: ""
fullnameOverride: ""

# External Redis URL used when not injected via secret key REDIS_URL.
# Example: redis://redis.example:6379/0
externalRedis:
  url: ""

# ── Control Plane ─────────────────────────────────────────────────────────────
controlPlane:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-control-plane
    tag: "1.0.1"
    digest: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000
    annotations: {}

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  livenessProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  startupProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    failureThreshold: 12
    periodSeconds: 10

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  config:
    logLevel: INFO
    environment: production
    algorithm: HS256
    accessTokenExpireMinutes: 60
    corsOrigins: "https://app.dcraftfusion.io"

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

  ingress:
    enabled: false
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/limit-rps: "100"
    hosts:
      - host: api.dcraftfusion.io
        paths:
          - path: /api
            pathType: Prefix
    tls: []

# ── CDC Workers ───────────────────────────────────────────────────────────────
cdcWorkers:
  enabled: true

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-worker
    tag: "1.0.1"
    digest: ""
    pullPolicy: IfNotPresent

  metricsPort: 8080

  postgres:
    enabled: true
    replicas: 1
    storage: 5Gi
    storageClass: ""
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  mysql:
    enabled: true
    replicas: 1
    storage: 5Gi
    storageClass: ""
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  mongodb:
    enabled: true
    replicas: 1
    storage: 5Gi
    storageClass: ""
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

# ── Spark Consumer (optional) ─────────────────────────────────────────────────
sparkConsumer:
  enabled: false
  replicaCount: 1

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-spark-consumer
    tag: "1.0.1"
    digest: ""
    pullPolicy: IfNotPresent

  storage:
    size: 20Gi
    storageClass: ""

  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi

  livenessProbe:
    enabled: false

  readinessProbe:
    enabled: false

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]

  config:
    sparkMaster: "local[*]"
    sparkCheckpointDir: /var/lib/spark/checkpoints
    consumerGroup: fusion-spark
    metricsPort: 8080
    sparkUiPort: 4040

  env: {}
  extraEnv: []

  serviceAccount:
    create: false
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-frontend
    tag: "1.0.1"
    digest: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080
    annotations: {}

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: app.dcraftfusion.io
        paths:
          - path: /
            pathType: Prefix
    tls: []

# ── Transform Worker (optional) ───────────────────────────────────────────────
transformWorker:
  enabled: false
  replicaCount: 0

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-transform-worker
    tag: "1.0.1"
    digest: ""
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 4Gi

  hpa:
    enabled: false
    minReplicas: 0
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]

  config:
    highPriorityQueue: fusion:transforms:high
    normalPriorityQueue: fusion:transforms:normal
    duckdbThreads: "2"
    duckdbMemoryLimit: 3GB

  env: {}
  extraEnv: []

  serviceAccount:
    create: false
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

  keda:
    enabled: false
    minReplicaCount: 0
    maxReplicaCount: 50
    cooldownPeriod: 120
    pollingInterval: 5

# ── Monitoring (optional Prometheus Operator) ─────────────────────────────────
monitoring:
  serviceMonitor:
    enabled: false
    interval: 15s
    scrapeTimeout: 10s
