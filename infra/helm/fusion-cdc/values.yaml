# Fusion CDC ├втВмтАЭ image-only chart (public)
# CDC engine source is proprietary. This chart deploys official DCraft Labs images from GHCR.
# Never commit real passwords. Prefer global.secrets.existingSecret.

global:
  imageRegistry: ""
  imagePullSecrets: []
  labels: {}
  edition: community

  secrets:
    # Pre-created Secret name (recommended). When set, the chart does not create secrets.
    existingSecret: ""
    # When true and existingSecret is empty, create a Secret from placeholders below.
    createSecret: false
    # Keys expected:
    #   DATABASE_URL, SECRET_KEY, ENCRYPTION_KEY, WORKER_TOKEN_SECRET, WORKER_TOKEN
    #   REDIS_URL (optional if externalRedis.url is set in ConfigMap path)
    databaseUrl: ""
    secretKey: ""
    encryptionKey: ""
    workerTokenSecret: ""
    workerToken: ""
    redisUrl: ""

nameOverride: ""
fullnameOverride: ""

# External Redis URL used when not injected via secret key REDIS_URL.
# Example: redis://redis.example:6379/0
externalRedis:
  url: ""


# ├втАЭтВм├втАЭтВм Control Plane ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм
controlPlane:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-control-plane
    tag: "{{ .Chart.AppVersion }}"
    digest: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000
    annotations: {}

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  livenessProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  startupProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    failureThreshold: 12
    periodSeconds: 10

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    # v1.2.28 Task 8: pin runAsUser/fsGroup so Kubernetes can verify the
    # image's non-numeric USER directive (the control-plane image runs as
    # the system user `fusion`, UID 999). Without this the pod can fail with
    # CreateContainerConfigError on strict admission controllers.
    runAsUser: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  config:
    logLevel: INFO
    environment: production
    algorithm: HS256
    accessTokenExpireMinutes: 60
    corsOrigins: "https://app.dcraftfusion.io"

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

  ingress:
    enabled: false
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/limit-rps: "100"
    hosts:
      - host: api.dcraftfusion.io
        paths:
          - path: /api
            pathType: Prefix
    tls: []

# ├втАЭтВм├втАЭтВм CDC Workers ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм
cdcWorkers:
  enabled: true

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-worker
    tag: "{{ .Chart.AppVersion }}"
    digest: ""
    pullPolicy: IfNotPresent

  metricsPort: 8080

  postgres:
    enabled: true
    replicas: 1
    storage: 5Gi
    storageClass: ""
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  mysql:
    enabled: true
    replicas: 1
    storage: 5Gi
    storageClass: ""
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  mongodb:
    enabled: true
    replicas: 1
    storage: 5Gi
    storageClass: ""
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    # v1.2.28 Task 8: pin runAsUser/fsGroup so Kubernetes can verify
    # the image's non-numeric USER directive (the cdc-worker image runs as user `fusion` (UID 2000, GID 2000 тАФ see docker/Dockerfile.cdc-worker).)
    runAsUser: 2000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

# ├втАЭтВм├втАЭтВм Spark Consumer (optional) ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм
sparkConsumer:
  enabled: false
  replicaCount: 1

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-spark-consumer
    tag: "{{ .Chart.AppVersion }}"
    digest: ""
    pullPolicy: IfNotPresent

  storage:
    size: 20Gi
    storageClass: ""

  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi

  livenessProbe:
    enabled: false

  readinessProbe:
    enabled: false

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    # v1.2.28 Task 8: pin runAsUser/fsGroup so Kubernetes can verify
    # the image's non-numeric USER directive (spark-consumer is disabled by default (Kafka removed in v1.2.25); generic non-root UID 1000 тАФ adjust if you enable it.)
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]

  config:
    sparkMaster: "local[*]"
    sparkCheckpointDir: /var/lib/spark/checkpoints
    consumerGroup: fusion-spark
    metricsPort: 8080
    sparkUiPort: 4040

  env: {}
  extraEnv: []

  serviceAccount:
    create: false
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

# ├втАЭтВм├втАЭтВм Frontend ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм
frontend:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-frontend
    tag: "{{ .Chart.AppVersion }}"
    digest: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080
    annotations: {}

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    # v1.2.28 Task 8: pin runAsUser/fsGroup so Kubernetes can verify
    # the image's non-numeric USER directive (the frontend image runs as `nginx` (UID 101, GID 101).)
    runAsUser: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: app.dcraftfusion.io
        paths:
          - path: /
            pathType: Prefix
    tls: []

# ├втАЭтВм├втАЭтВм Transform Worker (DuckDB landing ├втВмтАЭ preferred over Spark) ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм
transformWorker:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-transform-worker
    tag: "{{ .Chart.AppVersion }}"
    digest: ""
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 4Gi

  hpa:
    enabled: false
    minReplicas: 0
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    # v1.2.18: the transform-worker image runs as user `transform` (UID 2001,
    # GID 2001 тАФ see docker/Dockerfile.transform-worker). Without explicit
    # runAsUser/fsGroup Kubernetes cannot verify the non-numeric USER
    # directive in the image and the pod fails with
    # CreateContainerConfigError. Pin both to 2001 so the pod starts cleanly.
    runAsUser: 2001
    fsGroup: 2001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]

  config:
    highPriorityQueue: fusion:transforms:high
    normalPriorityQueue: fusion:transforms:normal
    duckdbThreads: "2"
    duckdbMemoryLimit: 3GB

  env: {}
  extraEnv: []

  serviceAccount:
    create: false
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

  keda:
    # v1.2.28 Task 3: configurable KEDA max scale for the initial sync.
    # KEDA scales the transform-worker Deployment from minReplicaCount (idle,
    # scale-to-zero) up to maxReplicaCount when the
    # ``fusion:transforms:high`` queue depth grows. Each initial-load task
    # consumes one PK-range partition (Task 1), so raising maxReplicaCount
    # lets K concurrent pods process K partitions of the same table in
    # parallel (true intra-table parallelism). Raise this for large
    # initial loads (e.g. 50 for a 118M-row load with parallelism=16).
    # NOTE: KEDA's max is global per ScaledObject тАФ the per-connection
    # ``parallelism`` (resource_limits.parallelism) controls how many
    # partitions a single connection enqueues, NOT how many pods KEDA will
    # spin up across ALL connections. Size maxReplicaCount for the peak
    # combined parallelism of all concurrent initial loads.
    enabled: false
    minReplicaCount: 0
    maxReplicaCount: 50
    cooldownPeriod: 120
    pollingInterval: 5

# -- Iceberg Committer (v1.3.4 Fix 1) ----------------------------------------
# The v1.2.39 single-committer redesign ships in the transform-worker image
# (iceberg_committer.py) but nothing in the shipped system runs it. This
# Deployment renders one committer pod per (connection, table) target listed
# below; each pod runs python iceberg_committer.py --connection-id <id>
# --table <table> --namespace <ns> which drains the pending-files Redis list
# and registers staged Parquet files in a single Iceberg commit via
# table.transaction().add_files(). Set committer.enabled=true to render the
# runner; add one target per active staged (conn, table) pair. Liveness and
# readiness probes exec a Python one-liner that checks the pending-list
# length (drain lag) in Redis against the thresholds below. A headless
# Service is created per target for metrics scraping.
committer:
  enabled: false
  replicaCount: 1
  metricsPort: 8081
  # v1.3.5 Fix 5: startupProbe waits for Nessie's /api/v1/config endpoint
  # before the main committer process starts (cold-start race mitigation).
  # This is an image-only chart (bring your own Nessie), so the URL is
  # configurable here. Default matches the brief example.
  startupProbe:
    nessieUrl: "http://nessie:19120/api/v1/config"
  # Drain-lag thresholds (pending-files list length) for the exec probes.
  readinessLagThreshold: 1000
  livenessLagThreshold: 5000
  # Tunables forwarded to the committer via env vars (see iceberg_committer.py).
  lockTtlS: 30
  drainBatch: 100
  drainTimeoutMs: 5000
  idleSleepS: 5.0
  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-transform-worker
    tag: "{{ .Chart.AppVersion }}"
    digest: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 2001
    fsGroup: 2001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: {}
  extraEnv: []
  podAnnotations: {}
  podLabels: {}
  # One entry per active staged (conn, table) pair. The committer pod runs
  # python iceberg_committer.py --connection-id <id> --table <table>
  # --namespace <ns>. catalogConfig (optional JSON dest config) is forwarded
  # to load_catalog when the catalog needs explicit credentials.
  targets: []
    # - enabled: true
    #   connectionId: "conn-postgres-prod"
    #   table: "customer_partner_relation"
    #   namespace: "fusion"
    #   catalogConfig: ""
# ├втАЭтВм├втАЭтВм Monitoring (optional Prometheus Operator) ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм
monitoring:
  serviceMonitor:
    enabled: false
    interval: 15s
    scrapeTimeout: 10s
