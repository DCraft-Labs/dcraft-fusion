# Fusion CDC ├бРѓгРђЮ image-only chart (public)
# CDC engine source is proprietary. This chart deploys official DCraft Labs images from GHCR.
# Never commit real passwords. Prefer global.secrets.existingSecret.

global:
  imageRegistry: ""
  imagePullSecrets: []
  labels: {}
  edition: community

  secrets:
    # Pre-created Secret name (recommended). When set, the chart does not create secrets.
    existingSecret: ""
    # When true and existingSecret is empty, create a Secret from placeholders below.
    createSecret: false
    # Keys expected:
    #   DATABASE_URL, SECRET_KEY, ENCRYPTION_KEY, WORKER_TOKEN_SECRET, WORKER_TOKEN
    #   REDIS_URL (optional if externalRedis.url is set in ConfigMap path)
    databaseUrl: ""
    secretKey: ""
    encryptionKey: ""
    workerTokenSecret: ""
    workerToken: ""
    redisUrl: ""

nameOverride: ""
fullnameOverride: ""

# External Redis URL used when not injected via secret key REDIS_URL.
# Example: redis://redis.example:6379/0
externalRedis:
  url: ""


# ├бРђЮРѓг├бРђЮРѓг Control Plane ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
controlPlane:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-control-plane
    tag: "1.2.27"
    digest: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000
    annotations: {}

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  livenessProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  startupProbe:
    enabled: true
    httpGet:
      path: /api/v1/monitoring/health
      port: http
    failureThreshold: 12
    periodSeconds: 10

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    # v1.2.27 Task 8: pin runAsUser/fsGroup so Kubernetes can verify the
    # image's non-numeric USER directive (the control-plane image runs as
    # the system user `fusion`, UID 999). Without this the pod can fail with
    # CreateContainerConfigError on strict admission controllers.
    runAsUser: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  config:
    logLevel: INFO
    environment: production
    algorithm: HS256
    accessTokenExpireMinutes: 60
    corsOrigins: "https://app.dcraftfusion.io"

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

  ingress:
    enabled: false
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/limit-rps: "100"
    hosts:
      - host: api.dcraftfusion.io
        paths:
          - path: /api
            pathType: Prefix
    tls: []

# ├бРђЮРѓг├бРђЮРѓг CDC Workers ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
cdcWorkers:
  enabled: true

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-worker
    tag: "1.2.27"
    digest: ""
    pullPolicy: IfNotPresent

  metricsPort: 8080

  postgres:
    enabled: true
    replicas: 1
    storage: 5Gi
    storageClass: ""
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  mysql:
    enabled: true
    replicas: 1
    storage: 5Gi
    storageClass: ""
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  mongodb:
    enabled: true
    replicas: 1
    storage: 5Gi
    storageClass: ""
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    # v1.2.27 Task 8: pin runAsUser/fsGroup so Kubernetes can verify
    # the image's non-numeric USER directive (the cdc-worker image runs as user `fusion` (UID 2000, GID 2000 Рђћ see docker/Dockerfile.cdc-worker).)
    runAsUser: 2000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]

  env: {}
  extraEnv: []

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

# ├бРђЮРѓг├бРђЮРѓг Spark Consumer (optional) ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
sparkConsumer:
  enabled: false
  replicaCount: 1

  image:
    repository: ghcr.io/dcraft-labs/fusion-cdc-spark-consumer
    tag: "1.2.27"
    digest: ""
    pullPolicy: IfNotPresent

  storage:
    size: 20Gi
    storageClass: ""

  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi

  livenessProbe:
    enabled: false

  readinessProbe:
    enabled: false

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

  podSecurityContext:
    runAsNonRoot: true
    # v1.2.27 Task 8: pin runAsUser/fsGroup so Kubernetes can verify
    # the image's non-numeric USER directive (spark-consumer is disabled by default (Kafka removed in v1.2.25); generic non-root UID 1000 Рђћ adjust if you enable it.)
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]

  config:
    sparkMaster: "local[*]"
    sparkCheckpointDir: /var/lib/spark/checkpoints
    consumerGroup: fusion-spark
    metricsPort: 8080
    sparkUiPort: 4040

  env: {}
  extraEnv: []

  serviceAccount:
    create: false
    name: ""
    annotations: {}
    automountServiceAccountToken: false

  podAnnotations: {}
  podLabels: {}

# ├бРђЮРѓг├бРђЮРѓг Frontend ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг
