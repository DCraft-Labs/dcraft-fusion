# Local Docker Desktop overrides for fusion-cdc (fits ~3Gi VM).
# Transform worker alone requests 2Gi â€” leave it off locally.
transformWorker:
  enabled: false

controlPlane:
  image:
    tag: "1.2.16"
  podDisruptionBudget:
    enabled: false
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  # Image default is 4 uvicorn workers â€” OOM under ~384Mi on Docker Desktop.
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]
  startupProbe:
    enabled: true
    failureThreshold: 36
    periodSeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

frontend:
  image:
    tag: "1.2.16"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

cdcWorkers:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 2000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault
  postgres:
    enabled: true
    replicas: 1
    storage: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 384Mi
  mysql:
    enabled: false
  mongodb:
    enabled: false

# In-cluster Kafka for local-dev CDC pipeline (cdc-workers â†’ Kafka â†’
# spark-consumer). Single broker, KRaft mode, small heap to fit the Docker
# Desktop VM. Production should set kafka.enabled=false and provide
# KAFKA_BOOTSTRAP_SERVERS via cdcWorkers.env / sparkConsumer.env.
kafka:
  enabled: true
  replicas: 1
  numPartitions: 1
  replicationFactor: 1
  externalNodePort: 30092
  heapOpts: "-Xmx384m -Xms192m"
  initHeapOpts: "-Xmx192m -Xms96m"
  storage:
    size: 2Gi
    storageClass: ""
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 768Mi
