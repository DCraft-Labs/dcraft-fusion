# Local Docker Desktop overrides for fusion-cdc (fits ~3Gi VM).
# Transform worker alone requests 2Gi — leave it off locally.
transformWorker:
  enabled: false
  # v1.2.28 Task 3: configurable KEDA max scale for initial sync. Local-dev
  # keeps a small max (4) — production should raise this for large initial
  # loads (see infra/helm/fusion-cdc/values.yaml transformWorker.keda).
  keda:
    enabled: false
    minReplicaCount: 0
    maxReplicaCount: 4
  image:
    tag: "1.3.6"
  env:
    # 2026-07-24: verbose observability for clean re-test — DEBUG level
    # plus unbuffered stdout (a plain logging.basicConfig(stdout) handler
    # is block-buffered when stdout isn't a TTY).
    LOG_LEVEL: "DEBUG"
    PYTHONUNBUFFERED: "1"
    # Cap adaptive chunk growth so a 2Gi-limited pod cannot OOM.
    INITIAL_LOAD_ADAPTIVE_MAX_CHUNK: "20000"

controlPlane:
  image:
    tag: "1.3.6"
  podDisruptionBudget:
    enabled: false
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  # Image default is 4 uvicorn workers — OOM under ~384Mi on Docker Desktop.
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]
  startupProbe:
    enabled: true
    failureThreshold: 36
    periodSeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

frontend:
  image:
    tag: "1.3.6"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

cdcWorkers:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 2000
    fsGroup: 2000
    seccompProfile:
      type: RuntimeDefault
  postgres:
    enabled: true
    replicas: 1
    storage: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 384Mi
  mysql:
    enabled: false
  mongodb:
    enabled: false

# v1.3.6 Bug #9 — committer defaults for staged Iceberg drains.
# Chart template reads .Values.committer.replicaCount (not replicas).
# targets: left for the operator. v1.3.5 UUID naming still applies —
# Deployment name is sha256(connectionId+table)[:10]; recreating a
# connection (new UUID) creates a new Deployment object.
committer:
  enabled: true
  replicaCount: 1
  drainBatch: 300
  image:
    tag: "1.3.6"
  env:
    LOG_LEVEL: "DEBUG"
    PYTHONUNBUFFERED: "1"
  targets: []
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2048Mi
