{{- if .Values.controlPlaneKernel.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dcraft-fusion.controlPlaneKernel.serviceAccountName" . }}
  labels:
    {{- include "dcraft-fusion.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane-kernel
  {{- with .Values.controlPlaneKernel.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.controlPlaneKernel.serviceAccount.automountServiceAccountToken }}
{{- end }}
---
{{- if .Values.web.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dcraft-fusion.web.serviceAccountName" . }}
  labels:
    {{- include "dcraft-fusion.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
  {{- with .Values.web.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.web.serviceAccount.automountServiceAccountToken }}
{{- end }}
