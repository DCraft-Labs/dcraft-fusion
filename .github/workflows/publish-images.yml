name: Publish images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: control-plane-kernel
            image: dcraft-fusion-control-plane-kernel
            context: .
            file: services/control-plane-kernel/Dockerfile
            platforms: linux/amd64,linux/arm64
          - name: web
            image: dcraft-fusion-web
            context: .
            file: apps/web/Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v5

      - name: Derive tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          REF="${GITHUB_REF_NAME}"
          SEMVER="${REF#v}"
          SHA_SHORT="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          REGISTRY="ghcr.io/dcraft-labs"
          IMAGE="${REGISTRY}/${{ matrix.image }}"
          {
            echo "image=${IMAGE}"
            echo "tags<<EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:${SEMVER}"
            echo "${IMAGE}:sha-${SHA_SHORT}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
